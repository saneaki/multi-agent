# multi-agent-shogun 設定ファイル

# 言語設定
# ja: 日本語（戦国風日本語のみ、併記なし）
# en: 英語（戦国風日本語 + 英訳併記）
# その他の言語コード（es, zh, ko, fr, de 等）も対応
language: ja

# シェル設定
# bash: bash用プロンプト（デフォルト）
# zsh: zsh用プロンプト
shell: bash

# スキル設定
skill:
  # スキル保存先（スキル名に shogun- プレフィックスを付けて保存）
  save_path: "~/.claude/skills/"

  # ローカルスキル保存先（このプロジェクト専用）
  local_path: "/home/ubuntu/shogun/skills/"

# ログ設定
logging:
  level: info  # debug | info | warn | error
  path: "/home/ubuntu/shogun/logs/"

# Snapshot鮮度検出設定 (cmd_475 A3)
# auto-compact復旧時、snapshotが古過ぎる場合に警告・復旧スキップを行う
snapshot:
  freshness:
    warn_threshold_minutes: 30    # この値を超えるとWARN (復旧は継続)
    error_threshold_minutes: 360  # この値を超えるとERROR (復旧スキップ推奨) = 6時間

# cmd設定
cmd:
  context_policy:
    enum: [clear_between, preserve_across_stages]
    default: clear_between
    description: |
      cmd の subtask 間で context 継続が必要かを示す。
      - clear_between: 各 subtask 完了で /clear 可(デフォルト。大半の cmd はこちら)
      - preserve_across_stages: 段階間で設計意図・レビュー結果など文脈継続必須
        (例: cmd_530 の設計レビュー→実装→QC 三段構成)

# Bloomルーティング設定
# off: 全タスクを足軽に直送（軍師QCなし）
# manual: 家老がbloom_levelを判定しルーティング（L1-L3→足軽、L4-L6→軍師）
# auto: 軍師が全タスクをBloom分析してからルーティング
bloom_routing: "manual"

# GAS検証設定
gas_verify:
  # gas-mail-manager 元帳スプレッドシートID (非secret: Google Drive上の公開ID)
  spreadsheet_id: "1AMojM16Xs2i9lxMKgPnH6LdPJ5DhDKKULc4-gQt4UVE"
  ledger_sheet: "元帳"

clasp:
  warn_days: 25
  critical_days: 28
  token_path: /home/ubuntu/.clasprc.json

# 家老運用設定 (karo)
karo:
  # idle_member_names: validate_idle_members.sh が参照する dispatch 対象メンバー一覧
  # 新足軽追加時はここに追記するだけで validate_idle_members.sh が動的対応する
  idle_member_names:
    - 足軽1号(Sonnet)
    - 足軽2号(Sonnet+T)
    - 足軽3号(Sonnet)
    - 足軽4号(Opus+T)
    - 足軽5号(Opus+T)
    - 足軽6号(Codex)
    - 足軽7号(Codex)
    - 軍師(Opus+T)

#ntfy通知設定
ntfy_topic: "hananoen"

screenshot:
  path: "/mnt/c/Users/drug-/OneDrive/画像/スクリーンショット"

# CLI設定
cli:
  default: claude
  agents:
    ashigaru1:
      cli_type: claude
      model: claude-sonnet-4-6
      effort: max
    ashigaru2:
      cli_type: claude
      model: claude-sonnet-4-6
      effort: max
    ashigaru3:
      cli_type: claude
      model: claude-sonnet-4-6
      effort: max
    ashigaru4:
      cli_type: claude
      model: claude-opus-4-7
      effort: max
    ashigaru5:
      cli_type: claude
      model: claude-opus-4-7
      effort: max
    ashigaru6:
      cli_type: codex
      model: gpt-5.5
      effort: max
    ashigaru7:
      cli_type: codex
      model: gpt-5.5
      effort: max
    gunshi:
      cli_type: claude
      model: claude-opus-4-7
      effort: max
    karo:
      cli_type: claude
      model: claude-sonnet-4-6
      effort: max
    shogun:
      effort: max

