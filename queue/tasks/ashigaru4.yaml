  description: |
    【重要訂正】
    dual-review の役割分担は禁止。Opus/Codex は同じ課題・同じ資料・同じpromptで全範囲を独立審理すること。
    「設計担当」「実装担当」のように分けない。1人LLMの誤判定を cross-check するのが目的。

    【目的】
    n8n GHA failure alert の同一 run_id hourly 再発火について、全範囲を独立審理し、root cause と最小修正案を出す。

    【現象】
    cmd_698/699後も同一run https://github.com/saneaki/multi-agent/actions/runs/25620552772 が 07:01 UTC / 08:01 UTC などで hourly alert 再発火。
    active filter は機能しているが、dedupが同一runの再通知を止めていない。

    【仮説】
    - A: dedup key が run_id ではなく `{repo}|{workflow}|{hourWindow}` のため1h経過後に再alert
    - B: Gmailから同じ通知メールが再配送/未読再取得されている
    - C: cmd_698 Parse & Dedup変更時に staticData 永続化regression が混入

    【対象資料】
    - output/cmd_700_parse_dedup_node_snapshot.json
    - output/cmd_690_phase3_gmail_n8n_discord_alert.md
    - output/cmd_690_phase4_intentional_fail_runbook.md
    - output/cmd_698_n8n_gha_active_filter.md
    - output/cmd_699_cmd698_cleanup.md
    - docs/gha_alert_runbook.md
    - Issue #48: https://github.com/saneaki/multi-agent/issues/48

    【出力フォーマット】
    1. verdict: BLOCK / WARN / OK
    2. root cause: 第一原因と根拠
    3. 仮説検証: A/B/C それぞれ採用/却下/保留 + 根拠
    4. findings: CRITICAL/HIGH/MEDIUM/LOW、各findingに根拠と修正案
    5. Phase 1最小修正案: 同一 run_id 永続1回通知を満たす最小変更
    6. 影響範囲/リスク
    7. Issue #48 close条件

    【禁止】
    - n8n/GitHub/コード編集は禁止。レビューのみ。
    - 他方レビューを参照しない。独立審理する。
