  description: |
    【目的】
    cmd_705 RCA を踏まえ、shx/shc 系列の CLI 切替 silent failure を実装修正する。
    shx 起動後に「成功と表示されたが busy pane は旧CLIのまま」という状態をなくす。

    【実装方針】
    1. switch_cli.sh:
       - pane 解決後に tmux pane 存在確認を行う
       - /exit 送信の tmux 失敗を握り潰さない
       - wait_for_shell_prompt timeout は return 1
       - shell prompt へ戻れない pane には新 CLI コマンドを送らない
       - metadata 更新は新CLI起動成功後に限る
    2. shc.sh:
       - deploy 後、settings.yaml cli.agents と tmux metadata / 実プロセスを照合する
       - mismatch agent_id を列挙し、silent success にしない
    3. output/cmd_706_shx_silent_failure_fix.md:
       - 実装差分
       - busy pane 実証手順と結果
       - idle pane 正常系検証
       - 残リスク

    【安全制約】
    - active multiagent の実作業 pane を破壊しない。テストは隔離 tmux session/pane を優先する。
    - 実 multiagent pane への deploy テストが必要なら、影響範囲・rollback案・必要理由を karo inbox へ報告して停止する。
    - dashboard は触らない。
    - GitHub Issue #52 を更新し、完了時は close 条件を満たすこと。

    【完了報告】
