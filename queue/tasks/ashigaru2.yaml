purpose: |
  ~/.claude/commands/ のマルチモデル協調系コマンド7件を
  ~/.claude/skills/{name}/SKILL.md 形式に変換する。
  Codex/Gemini外部モデル依存箇所にはモデル可用性注記を追加すること。

target_commands:
  - multi-workflow
  - multi-backend
  - multi-execute
  - multi-frontend
  - multi-plan
  - orchestrate
  - model-route

acceptance_criteria:
  - "7件全て /home/ubuntu/.claude/skills/{name}/SKILL.md が作成されている"
  - "各SKILL.mdのYAMLフロントマターが正しい（name・description必須）"
  - "元コマンドのワークフローステップが全て保持されている"
  - "Codex/Gemini依存コマンドにモデル可用性注記が追加されている"
  - "report YAMLをqueue/reports/ashigaru2_report.yamlに記載している"

context: |
  【作業対象ディレクトリ】
  - 読込元: /home/ubuntu/.claude/commands/{name}.md
  - 作成先: /home/ubuntu/.claude/skills/{name}/SKILL.md
  ※ skills/{name}/ ディレクトリは mkdir -p で事前作成すること

  【SKILL.mdテンプレート】
  ---
  name: {name}
  description: "{250文字以内。キーワードを先頭に。英語}"
  disable-model-invocation: true  # 副作用ありの場合のみ
  # argument-hint: [args]  # 引数がある場合
  ---
  （本文は commands/*.md の内容を移植）

  【構造改善】
  - "## When to Activate" セクションを冒頭に追加
  - Phase分けがある場合はその構造を踏襲・明確化
  - DO/DON'T セクション（該当する場合）
  - Codex/Gemini外部モデルを使う場合は注記:
    "Note: Requires Codex/Gemini availability. Falls back to Claude-only if unavailable."

  【副作用判定 — 以下に該当すれば disable-model-invocation: true 必須】
  - git commit/push を含む → 該当なし（マルチモデル系は分析・生成のみ）
  - ファイル削除を含む → 要確認
  - 外部サービスへの送信を含む → Codex/Gemini APIコール = 副作用

  【各コマンドの概要】
  - multi-workflow: 6フェーズ協調開発（Research→Ideation→Plan→Execute→Optimize→Review）with Codex/Gemini routing
  - multi-backend: バックエンド特化マルチモデル開発（Codex主導）
  - multi-execute: マルチモデル協調実行（プロトタイプ→Claude実装→マルチモデル監査）
  - multi-frontend: フロントエンド特化マルチモデル開発（Gemini主導）
  - multi-plan: マルチモデル協調計画（デュアルモデル分析→実装計画生成）
  - orchestrate: 逐次マルチエージェントワークフロー（feature/bugfix/refactor/security）
  - model-route: タスク複雑度・予算制約からhaiku/sonnet/opusの最適モデル推奨

  【既存スキルの参考フォーマット】
  /home/ubuntu/.claude/skills/tdd-workflow/SKILL.md を参照せよ

