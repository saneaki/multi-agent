  instructions: |
    ntfy経由のcmd完了通知で将軍を自動起動する仕組みを実装せよ。

    ■ 修正1: scripts/ntfy.sh
    - Read scripts/ntfy.sh
    - 第3引数 EXTRA_TAGS を追加（オプション）
    - 指定時: Tags: outbound,{EXTRA_TAGS}
    - 未指定時: Tags: outbound（現行動作維持）
    - 例: bash scripts/ntfy.sh "message" "title" "cmd_complete"
      → Tags: outbound,cmd_complete

    ■ 修正2: scripts/ntfy_listener.sh
    - Read scripts/ntfy_listener.sh
    - L157-159のoutboundスキップロジックを変更:
      - outboundのみ → スキップ（現行動作維持）
      - outbound + cmd_complete → スキップしない → 将軍起動処理へ
    - 将軍起動処理を追加:
      - cmd_completeタグ検出時、tmux send-keys で将軍paneに通知
      - 将軍pane: tmux display-message -t "$(tmux list-panes -t multiagent -a -F '#{window_name}:#{pane_index} #{@agent_id}' | grep shogun | cut -d' ' -f1)" 等で特定
        → または shogun:main (固定) を使用
      - 通知内容は短く: "cmd_complete: {メッセージの一部}" 程度
      - ntfy_inbox.yamlには絶対に書き込まない

    ■ 修正3: instructions/karo.md
    - Read instructions/karo.md
    - Step 11.7の ntfy送信ステップを探す
    - 既存: bash scripts/ntfy.sh "メッセージ" "タイトル"
    - 変更: bash scripts/ntfy.sh "メッセージ" "タイトル" "cmd_complete"
    - cmd_completeタグを付ける旨を明記

    ■ 設計制約
    - from_karo_allowed: false は絶対に変更しない
    - inbox_write.shは使わない（ntfy経路のみ）
    - 将軍への通知は起動トリガーのみ。内容はdashboard.mdから読む設計

    ■ テスト
    - bash scripts/ntfy.sh "テスト" "test" "cmd_complete" が正常送信されることを確認
    - Tags ヘッダーに outbound,cmd_complete が含まれることを確認(curlの-v等で)
    - ntfy_listener.shの変更箇所が構文エラーなくbash -n通過
