instructions: |
  ■ Obsidian法律Vault Phase1 — Part A: リポジトリ+テンプレート

  ■ Step 1: 参照資料読み込み
  以下を順に読んで全体像を把握:
  - /home/ubuntu/shogun/output/cmd_386_part_a.md（アーキテクチャ・フロントマター）
  - /home/ubuntu/shogun/output/cmd_386_part_b.md（テンプレート・ダッシュボード）
  統合版は大きいため読まなくてよい。Part A + B で十分。

  ■ Step 2: GitHubリポジトリ作成
  GitHub MCP (mcp__github__create_repository) で:
  - name: legal-vault
  - owner: saneaki
  - private: true
  - description: "Obsidian法律文書管理Vault"

  ■ Step 3: ローカルにクローン+構造作成
  cd /tmp
  git clone https://github.com/saneaki/legal-vault.git
  cd legal-vault

  フォルダ構造を作成:
  mkdir -p .obsidian templates dashboards cases/_sample drafts pdfs reference

  ■ Step 4: .gitignore作成
  ```
  .obsidian/workspace.json
  .obsidian/workspace-mobile.json
  .trash/
  .DS_Store
  *.swp
  ```

  ■ Step 5: .obsidian/設定ファイル
  .obsidian/community-plugins.json:
  ["obsidian-git", "templater-obsidian", "dataview", "omnisearch"]

  .obsidian/app.json:
  {"promptDelete": false, "alwaysUpdateLinks": true}

  ■ Step 6: テンプレート7種作成（cmd_386 Part Bのコードブロックをベースに）
  各テンプレートにTemplater構文+フロントマタースキーマを含める。

  フロントマター共通スキーマ（cmd_386 Part A参照）:
  ---
  client: ""
  case_name: ""
  doc_type: "訴状"  # (種別に応じて変更)
  status: "draft"
  created: "<% tp.date.now('YYYY-MM-DD') %>"
  due_date: ""
  notion_url: ""
  court: ""
  case_number: ""
  tags: []
  ---

  作成するファイル:
  - templates/訴状.md
  - templates/準備書面.md
  - templates/答弁書.md
  - templates/申立書.md
  - templates/依頼者報告書.md
  - templates/送付状_FAX.md
  - templates/送付状_郵送.md

  テンプレート内容はcmd_386 Part Bのコードブロックをそのまま使用してよい。
  Templater構文（<% tp.date.now() %> 等）を含めること。

  ■ Step 7: サンプル案件
  cases/_sample/README.md を作成:
  案件フォルダの構造例を示すドキュメント（訴状/準備書面/証拠リスト等のサブフォルダ）。

  ■ Step 8: pdfs/ と reference/
  pdfs/.gitkeep を作成（閲覧専用フォルダ、中身は空）
  reference/.gitkeep を作成（pandocテンプレート用、Phase2で使用）

  ■ Step 9: git commit + push
  cd /tmp/legal-vault
  git add -A
  git commit -m "feat: Obsidian法律Vault Phase1 — リポジトリ構造+テンプレート7種"
  git push origin main

  ■ 注意
  - テンプレートの日本語ファイル名はそのまま使用（Obsidianは日本語ファイル名対応）
  - pdfs/ は .gitkeep のみ。中身は入れない
  - Notion連携Phase2のn8n WFは今回作成しない
  - pandocのpython-docxポストプロセスは実装しない

