  ■ SC-026 内容:
    名前: n8n-http-predefined-credential
    問題: HTTP RequestノードでCode nodeのhttpRequestWithAuthentication()が使えない場合の認証設定
    解法: HTTP Requestノードのauthentication="predefinedCredentialType"を使い既存クレデンシャルを参照する
    パターン:
      HTTP Request node parameters:
        "authentication": "predefinedCredentialType",
        "nodeCredentialType": "gmailOAuth2",   // 例: Gmail OAuth2
      他の例:
        "nodeCredentialType": "googleSheetsOAuth2Api"
        "nodeCredentialType": "slackApi"
    注意:
      - Code nodeの$helpers.httpRequestWithAuthentication()はCode node内専用
      - HTTP Requestノードには使えないためpredefinedCredentialTypeを使う
      - 詳細パターンはn8n-http-credential-patterns参照

