description: |
  instructions/ の3ファイル(shogun.md, ashigaru.md, gunshi.md)をupstream/main版ベースに再構築し、
  マージ判断レポートを作成せよ。

  ■ 共通方針
  - `git show upstream/main:instructions/{file}.md` でupstream版を取得
  - upstream版をそのままベースにし、フォーク独自セクションを末尾「# Fork Extensions」に追記
  - upstreamの既存セクション内容は一切変更しない

  ■ STEP 1: shogun.md 再構築

    (1a) upstream版取得:
         git show upstream/main:instructions/shogun.md > /tmp/shogun_new.md

    (1b) Fork Extensions抽出:
         フォーク版: /home/ubuntu/shogun/instructions/shogun.md

         セクション1: "## 🚨要対応 Active Monitoring" (fork L169付近)
           grep -n "要対応 Active Monitoring" /home/ubuntu/shogun/instructions/shogun.md
           → 見つかった行番号から "^## ntfy Input Handling" の手前まで抽出
           ※ "## ntfy Input Handling" はupstreamにあるので除外

         セクション2: "## Post-ntfy State Audit" (fork L222付近)
           grep -n "^## Post-ntfy State Audit" /home/ubuntu/shogun/instructions/shogun.md
           → 見つかった行番号から次の "^## " 見出しの手前まで抽出

    (1c) 結合:
         cat /tmp/shogun_new.md > /tmp/shogun_final.md
         printf "\n# Fork Extensions\n\n> フォーク独自の実運用知見。\n\n" >> /tmp/shogun_final.md
         # セクション1とセクション2を追記
         cp /tmp/shogun_final.md /home/ubuntu/shogun/instructions/shogun.md

  ■ STEP 2: ashigaru.md 再構築

    (2a) upstream版取得:
         git show upstream/main:instructions/ashigaru.md > /tmp/ashigaru_new.md

    (2b) Fork Extensions抽出:
         フォーク版: /home/ubuntu/shogun/instructions/ashigaru.md

         セクション1: "## n8n Workflow Fix Protocol (Mandatory)" (fork L286付近)
           grep -n "n8n Workflow Fix Protocol" /home/ubuntu/shogun/instructions/ashigaru.md
           → 見つかった行番号から "^## Shout Mode" の手前まで抽出
           ※ "## Shout Mode (echo_message)" はupstreamにあるので除外

    (2c) 結合:
         cat /tmp/ashigaru_new.md > /tmp/ashigaru_final.md
         printf "\n# Fork Extensions\n\n> フォーク独自の実運用知見。\n\n" >> /tmp/ashigaru_final.md
         # セクション1を追記
         cp /tmp/ashigaru_final.md /home/ubuntu/shogun/instructions/ashigaru.md

  ■ STEP 3: gunshi.md 再構築

    (3a) upstream版取得:
         git show upstream/main:instructions/gunshi.md > /tmp/gunshi_new.md

    (3b) Fork Extensions抽出:
         フォーク版: /home/ubuntu/shogun/instructions/gunshi.md

         セクション1: Category 2 Bloom Analysis Tasks (fork L259付近)
           grep -n "Category 2: Bloom Analysis Tasks" /home/ubuntu/shogun/instructions/gunshi.md
           → 見つかった行番号から "^### Category 3:" の手前まで抽出

         セクション2: Additional QC Criteria for n8n Workflows (fork L208付近)
           grep -n "Additional QC Criteria for n8n Workflows" /home/ubuntu/shogun/instructions/gunshi.md
           → 見つかった行番号から "^## Language & Tone" の手前まで抽出

         セクション3: Pattern 4 Bloom Analysis (fork L501付近)
           grep -n "Pattern 4: Bloom Analysis" /home/ubuntu/shogun/instructions/gunshi.md
           → 見つかった行番号から "^### Pattern 5:" の手前まで抽出

         注意: upstream F006は「QCフロー外更新禁止」のままにする（upstreamに寄せる）。
               フォーク版のF006とは別物。

    (3c) 結合:
         cat /tmp/gunshi_new.md > /tmp/gunshi_final.md
         printf "\n# Fork Extensions\n\n> フォーク独自の実運用知見。\n\n" >> /tmp/gunshi_final.md
         # セクション1(Category 2)、セクション2(n8n QC)、セクション3(Pattern 4)を追記
         cp /tmp/gunshi_final.md /home/ubuntu/shogun/instructions/gunshi.md

  ■ STEP 4: マージ判断レポート作成
    output/cmd_238_instructions_merge_report.md を作成せよ（フォルダ作成不要）。

    記載内容:
    1. 概要: cmd_238 instructions 4ファイル upstream/main再構築
    2. 各ファイルの変更概要 (4ファイル分):
       - ベース: upstream/main版 行数
       - 削除した内容（フォーク独自かつupstreamに寄せるために削除）
       - Fork Extensionsに集約した内容（セクション名のリスト）
    3. 受入基準充足確認 (cmd_238の acceptance_criteria 10項目を検証)

  ■ STEP 5: git add + commit + push
    cd /home/ubuntu/shogun
    git add instructions/shogun.md instructions/ashigaru.md instructions/gunshi.md \
            output/cmd_238_instructions_merge_report.md
    # subtask_238aのkaro.md commitがあれば一緒にpushされる
    git commit -m "refactor: cmd_238 shogun/ashigaru/gunshi.md upstream再構築 + マージ報告書"
    git push origin original

