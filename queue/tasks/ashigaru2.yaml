title: "Fix C: watcher_supervisor.sh 定期点呼(roll call)機能追加（Issue #3）"

north_star: "ウェルカム画面停止バグを根本解決し、5分間隔の自動点呼でエージェントを自律復旧させる"

context: |
  GitHub Issue #3 対策の第2フェーズ：
  Fix Aでは起動時のロール名送信を追加したが、Fix Cでは常駐監視として
  5分間隔でウェルカム画面を検出→自動復旧する仕組みを構築する。

  【対象ファイル】scripts/watcher_supervisor.sh（現在71行）
  【ペインマッピング】（既存の定数は使わず直接ハードコード）:
    karo    → multiagent:agents.0
    ashigaru1 → multiagent:agents.1
    ashigaru2 → multiagent:agents.2
    ashigaru3 → multiagent:agents.3
    ashigaru4 → multiagent:agents.4
    ashigaru5 → multiagent:agents.5
    ashigaru6 → multiagent:agents.6
    ashigaru7 → multiagent:agents.7
    gunshi  → multiagent:agents.8
    ※ 将軍(shogun:main)は点呼対象外

  【重要: watcher_supervisor.sh の既存構造を把握してから実装せよ】

steps:
  - "1. scripts/watcher_supervisor.sh を read する（既存構造の把握必須）"

  - "2. roll_call_check() 関数を実装する（新規関数）:"
  - |
    ```bash
    # ウェルカム画面パターン: 'Try "' または 'bypass permissions'
    is_welcome_screen() {
        local pane="$1"
        tmux capture-pane -t "$pane" -p 2>/dev/null | grep -qE 'Try "|bypass permissions'
    }

    roll_call_check() {
        local timestamp
        timestamp=$(date '+%Y-%m-%d %H:%M:%S')

        # エージェント:ペインのマッピング
        declare -A AGENT_PANES
        AGENT_PANES=(
            [karo]="multiagent:agents.0"
            [ashigaru1]="multiagent:agents.1"
            [ashigaru2]="multiagent:agents.2"
            [ashigaru3]="multiagent:agents.3"
            [ashigaru4]="multiagent:agents.4"
            [ashigaru5]="multiagent:agents.5"
            [ashigaru6]="multiagent:agents.6"
            [ashigaru7]="multiagent:agents.7"
            [gunshi]="multiagent:agents.8"
        )

        for agent in karo ashigaru1 ashigaru2 ashigaru3 ashigaru4 ashigaru5 ashigaru6 ashigaru7 gunshi; do
            local pane="${AGENT_PANES[$agent]}"

            # ペインが存在しない場合はスキップ
            if ! pane_exists "$pane"; then
                continue
            fi

            if is_welcome_screen "$pane"; then
                echo "[ROLL-CALL] [$timestamp] ${agent}: DEAD → sending role name..."
                tmux send-keys -t "$pane" "$agent"
                sleep 0.3
                tmux send-keys -t "$pane" Enter

                # 30秒後に確認
                sleep 30
                if ! is_welcome_screen "$pane"; then
                    echo "[ROLL-CALL] [$timestamp] ${agent}: REVIVED"
                else
                    echo "[ROLL-CALL] [$timestamp] ${agent}: DEAD (unreachable after retry)"
                fi
            else
                echo "[ROLL-CALL] [$timestamp] ${agent}: ALIVE"
            fi
        done
    }
    ```

  - "3. while loop に ROLL_CALL_INTERVAL制御を追加する:"
  - "   while true; do の直後に ROLL_CALL_LAST=0 の初期化（ループ外で定義してもよい）"
  - "   ループ内（start_cmd_notifier_if_missing の後）に以下を追加:"
  - |
    ```bash
    # 定期点呼: 5分間隔（300秒）
    _now=$(date +%s)
    if (( _now - ROLL_CALL_LAST >= 300 )); then
        roll_call_check 2>&1 | tee -a "$SCRIPT_DIR/logs/roll_call.log" || true
        ROLL_CALL_LAST=$_now
    fi
    ```

  - "4. ROLL_CALL_LAST=0 をwhile loopの前（ループ外）で初期化する"
  - "   ※ 既存の while true; do の直前に追加"

  - "5. bash -n scripts/watcher_supervisor.sh でシンタックスチェック（エラーなし必須）"

  - "6. git add scripts/watcher_supervisor.sh"
  - "   git commit -m 'feat: cmd_255 watcher_supervisor.sh 定期点呼(roll call)機能追加（Issue #3 Fix C）'"
  - "   git push origin original"

  - "7. 完了報告: queue/reports/ashigaru2_report.yaml に書く（report_to: gunshi）"
  - "8. bash scripts/inbox_write.sh gunshi '足軽2号、subtask_255b 完了でござる！品質確認を仰ぎたし！' report_received ashigaru2"

quality_rules:
  - "scripts/watcher_supervisor.sh に roll_call_check() 関数が実装されている"
  - "is_welcome_screen() 関数が実装され、'Try \"' または 'bypass permissions' パターンを検出する"
  - "5分間隔（300秒）でroll_call_check()が呼ばれる仕組みが while loop に追加されている"
  - "ログ出力が logs/roll_call.log に記録される"
  - "将軍ペイン(shogun:main)は点呼対象外"
  - "bash -n scripts/watcher_supervisor.sh が PASS"
  - "git push 済み"

important_notes:
  - "Read ツールで scripts/watcher_supervisor.sh を必ず先に読んでから Edit すること"
  - "pane_exists() 関数は既にwatcher_supervisor.shに定義されている（再実装不要）"
  - "declare -A（連想配列）はbash 4+必須。サーバーがbash 4以上であることを確認するか、別の実装を使うこと"
  - "inbox_watcher.shのエスカレーション(send-keys)との二重送信リスク: ウェルカム画面検出時のみ送信するため、通常は重複しない。ただし両者が同時に動作する可能性があれば注意"
  - "agent_is_busy()等の関数が存在する場合は活用可能（既存コードを先に確認）"
  - "ログファイル logs/roll_call.log への書き込みは && の後ろではなく | tee -a でリダイレクト"

