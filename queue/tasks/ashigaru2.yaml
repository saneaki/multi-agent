  3. 修正版を output/cmd_463_b2_sonnet_inbox_write.sh と output/cmd_463_b2_sonnet_inbox_watcher.sh に書き出す
  4. 設計書 output/cmd_463_b2_sonnet_design.md に変更箇所・リスク・後方互換性検証手順を記載
  5. 可能ならインラインテスト(bash -n syntax check 等)も記載

