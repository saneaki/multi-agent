  【Step 1: CHANGELOG更新】
  対象: /home/ubuntu/pdfmerged/docs/CHANGELOG.md
  [Unreleased] の下に [0.9.4] セクションを追記:

  ```markdown
  ## [0.9.4] - 2026-04-10

  ### Fixed
  - **ノートPC画面ボタン見切れ修正** (`pdf_tools/pdf_merger_tabbed.py`, `pdf_tools/tabs/rename_tab.py`, `pdf_tools/tabs/stamp_tab.py`, `pdf_tools/tabs/numberer_tab.py`)
    - `geometry("1440x900")` ハードコードを廃止し、画面サイズ検出ベースに変更
    - Windows: `ctypes EnumDisplayMonitors` で全モニター列挙、最大モニターサイズを基準にウィンドウサイズ決定
    - Linux/Mac: `winfo_screenwidth/height` フォールバック
    - `root.minsize(1000, 600)` を設定し最小サイズを保証
    - `rename_tab`, `stamp_tab`, `numberer_tab` の `button_frame.pack()` に `fill=tk.X` を追加
    - ノートPC(1366x768)環境でもボタンが見切れなくなる
  - **テキスト→PDF変換 改行位置異常修正** (`pdf_tools/file_converter.py`)
    - 文字数カウント方式 (`max_chars`) を廃止
    - `pdfmetrics.stringWidth()` ベースの幅測定で改行判定に変更
    - CJK/ASCII 混在テキストでも正確な改行位置を実現
    - タブ文字 (`\t`) は 4 スペースに展開してから幅測定
  ```

  【Step 2: git commit + push】
  cd /home/ubuntu/pdfmerged
  git add pdf_tools/pdf_merger_tabbed.py pdf_tools/tabs/rename_tab.py \
    pdf_tools/tabs/stamp_tab.py pdf_tools/tabs/numberer_tab.py \
    pdf_tools/file_converter.py docs/CHANGELOG.md
  git commit -m "fix: pdfmerged v0.9.4 ノートPC表示バグ+テキスト改行バグ修正"
  git push origin main

  【Step 3: GitHub Release作成 (Keep a Changelog形式)】
  RELEASE_NOTES の body を作成して gh release create:

  gh release create v0.9.4 \
    --title "v0.9.4 — ノートPC表示・テキスト改行バグ修正" \
    --notes "$(cat <<'NOTES'
  ## What's Changed

  ### Fixed
  - **ノートPC画面ボタン見切れ修正**: geometry をハードコード廃止し画面サイズ検出ベースに変更。ctypes EnumDisplayMonitors (Windows) / winfo_screenwidth (Linux/Mac) フォールバック対応。button_frame に fill=tk.X を追加。
  - **テキスト→PDF改行位置異常修正**: 文字数カウント方式を廃止し pdfmetrics.stringWidth() ベースに変更。CJK/ASCII 混在テキストでも正確な改行を実現。

  ## 対象ユーザー
  ノートPC(1366x768等の小画面)でボタンが見切れていた方、テキストファイルのPDF変換で改行位置がおかしかった方に修正が届きます。

  **Full Changelog**: https://github.com/saneaki/pdfmerged/compare/v0.9.3...v0.9.4
  NOTES
  )" \
    --repo saneaki/pdfmerged

  【Step 4: Release確認】
  gh release view v0.9.4 --repo saneaki/pdfmerged
  → タイトル・本文・タグが正しく設定されていることを確認

