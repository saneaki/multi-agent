  内容:
  - name: n8n-credential-oauth-refresh
  - descriptionトリガー: "OAuth", "refresh_token", "credential", "Google Sheets", "SQLite", "access_token"
  - ネガティブトリガー: "通常のn8n Google Sheets設定（OAuth2ノード経由で動作中）"
  - 本文:
    - 症状: n8nのCredential Storeに保存されたOAuth2トークンを直接使いたい
    - 原因: n8n標準ノードではCredential StoreのSQLiteから直接refresh_tokenを取得できない
    - 解決策: Execute Commandノードでsqlite3コマンドを使いCredential DBを読み取り、
              refresh_tokenからaccess_tokenを取得し、Google Sheets APIを直接叩くパターン
    - コード例: sqlite3コマンドでCredential復号 → HTTP RequestでOAuth refresh → API呼出し
    - 注意: Credential DBパス（~/.n8n/database.sqlite）、暗号化キーはN8N_ENCRYPTION_KEY

