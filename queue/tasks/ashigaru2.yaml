  - [ ] ashigaru.md: "# Fork Extensions" + "n8n Workflow Fix Protocol"
  - [ ] gunshi.md: "# Fork Extensions" + "Category 2: Bloom Analysis" + "n8n QC" + "Pattern 4"
  - [ ] 各ファイルにupstream既存セクションが存在する
