context: |
  【背景】
  cmd_405で独立した3タスクが足軽1名に直列割当された。
  家老のコンテキスト負荷を考慮し、分配判断を将軍側に移管する。殿の裁定済み。

  【変更1】shogun.md — cmd必須フィールドにdecomposition_hint追加
  既存の「Required cmd fields」またはcmdのYAMLテンプレート部分に追加:

    decomposition_hint:
      parallel: N           # 推奨並列足軽数（1=直列）
      gunshi_task: bool     # 軍師に独立タスクがあるか
      note: "判断理由"       # なぜこの分配か

  ガイドライン（同じセクションに追記）:
  - 相互依存のないタスクが複数 → parallel: タスク数
  - 調査・分析系 → gunshi_task: true
  - 同一ファイル編集あり → parallel: 1 + noteに理由
  - 判断に迷ったら多めに指定（家老が絞る方が安全）

  【変更2】CLAUDE.md — Shogun Mandatory Rules Rule 13追加
  CLAUDE.md の「Shogun Mandatory Rules」セクションに追加（現在のRule数+1番号で追記）:
  「13. **decomposition_hint**: cmdにタスク分配指針を含める（parallel数・gunshi_task有無・理由）。家老は原則従い、技術的理由（RACE-001/足軽空き不足/依存関係）でオーバーライド可。オーバーライド時はダッシュボードに理由を記載。」

