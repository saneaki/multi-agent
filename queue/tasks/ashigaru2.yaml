steps:
  - "■ Step 1: 現状確認"
  - "1. Read dashboard.md — 🛠️スキル欄の全エントリを確認"
  - "2. ls memory/ — skill_history.md の有無を確認"

  - "■ Step 2: memory/skill_history.md を作成（アーカイブ）"
  - "3. Write memory/skill_history.md を以下のフォーマットで作成:"
  - "   # スキル履歴アーカイブ"
  - "   # dashboard.md 🛠️スキル欄から溢れた全エントリ"
  - "   # 最新順（上が新しい）"
  - ""
  - "   dashboard.mdから entries 6〜24 + 「他17件」コメントを全てここに移動する。"
  - "   (entry 1〜5は dashboard に残す)"
  - "   ⚠️ 削除ではなくアーカイブ。全履歴を保持すること"

  - "■ Step 3: dashboard.md の🛠️スキル欄を整理"
  - "4. Read dashboard.md"
  - "5. Edit dashboard.md の 🛠️生成されたスキル セクションを以下のように更新:"
  - "   - 直近5件のみ残す（上記「残す5件」参照）"
  - "   - 表の下に「他N件 → memory/skill_history.md 参照」を追記"
  - "     （Nは dashboard から除外したエントリ数 + 元々の「他17件」）"
  - "   例: 「他36件 → memory/skill_history.md 参照」など"
  - "6. Edit後にRead dashboard.mdで確認。スキル欄が5件になっていること"

  - "■ Step 4: instructions/gunshi.md にFIFOルール追記"
  - "7. Read instructions/gunshi.md"
  - "8. 🛠️スキル候補の更新箇所（step 7.5付近）の後に以下を追記:"
  - "   ⚠️ スキル欄FIFO管理ルール:"
  - "   スキル欄は「直近5件」を維持する（FIFO）。"
  - "   新規エントリ追加時は最古エントリを memory/skill_history.md に移動してから追加。"
  - "   6件以上になったら即 memory/skill_history.md に最古を移動すること。"

  - "■ Step 5: instructions/karo.md にFIFOルール追記"
  - "9. Read instructions/karo.md"
  - "10. スキル候補関連箇所の後に以下を追記:"
  - "    ⚠️ スキル欄FIFO管理チェック（軍師漏れ防止）:"
  - "    軍師がスキルを追加した後、dashboard.md🛠️欄が6件以上になっていないか確認。"
  - "    超過している場合は最古エントリを memory/skill_history.md に移動する。"

  - "■ Step 6: dashboard_rotate.sh に自動トリム追加"
  - "11. Read scripts/dashboard_rotate.sh"
  - "12. ローテーション完了後（log \"ローテーション完了\"の後）に以下の処理を追加:"
  - "    スキル欄のエントリ数をカウントし、5件超の場合に最古エントリを"
  - "    memory/skill_history.md に移動するロジックを追加。"
  - "    関数名: trim_skill_entries"
  - "    シグネチャ: trim_skill_entries() { ... }"
  - "    ロジック:"
  - "      - 🛠️生成されたスキル セクションのテーブル行を数える（| **...** | ... | 形式）"
  - "      - 5件超の場合: 最古エントリ（テーブル最下行）を memory/skill_history.md の先頭に追記"
  - "      - dashboard.md から最古エントリを削除"
  - "      - 超過分がなくなるまで繰り返す"
  - "    実装後にlog \"スキル欄トリム完了\"などを追加"

  - "■ Step 7: git commit + push"
  - "13. git add memory/skill_history.md dashboard.md instructions/gunshi.md instructions/karo.md scripts/dashboard_rotate.sh"
  - "14. git commit -m 'feat: dashboardスキル欄FIFO管理（直近5件・自動トリム・ルール明文化）'"
  - "15. git push origin original"

  - "■ Step 8: 報告"
  - "16. Write queue/reports/ashigaru2_report.yaml"
  - "17. bash scripts/inbox_write.sh gunshi '足軽2号、subtask_315a完了。dashboardスキル欄5件整理+アーカイブ+ルール追記+自動トリム実装+push済み。report確認されたし。' report_received ashigaru2"

