instructions: |
  # cmd_402: 家老専用SessionStart hook作成

  作業ディレクトリ: /home/ubuntu/shogun
  Writeツールで直接ファイル作成すること。スキルコマンド・Skillツール使用禁止。

  ## 【1】scripts/hooks/karo_session_start_check.sh を作成

  以下の内容でWriteツールを使い直接作成:

  #!/usr/bin/env bash
  # karo_session_start_check.sh
  # 家老専用SessionStart環境確認hook
  # $TMUX_PANE未設定（VSCode環境）では何もしない
  # agent_id=karoの場合のみ委譲経路・禁止事項を通知する

  set -euo pipefail

  if [ -z "${TMUX_PANE:-}" ]; then
      exit 0
  fi

  AGENT_ID=$(tmux display-message -t "$TMUX_PANE" -p '#{@agent_id}' 2>/dev/null || echo "")

  if [ "$AGENT_ID" != "karo" ]; then
      exit 0
  fi

  echo "⚠️ 家老環境確認: tmux pane=$TMUX_PANE, agent_id=karo。"
  echo "   足軽1〜7号(multiagent:0.1〜0.7)への委譲経路は有効。"
  echo "   Agent()による成果物生成は禁止（F003）。足軽に委譲せよ。"
  echo "   Session Start Step 1完了。"
  exit 0

  その後: chmod +x scripts/hooks/karo_session_start_check.sh

  ## 【2】.claude/settings.json への登録

  /home/ubuntu/shogun/.claude/settings.json を読み込み（必ずReadしてから）、
  hooks.SessionStart 配列に以下を追加（既存エントリは保持すること）:
  {
    "matcher": "*",
    "hooks": [
      {
        "type": "command",
        "command": "bash /home/ubuntu/shogun/scripts/hooks/karo_session_start_check.sh"
      }
    ]
  }

  python3でJSONを読み込み・更新・書き出しすること。

  ## 【3】動作テスト

  bash scripts/hooks/karo_session_start_check.sh
  # （tmuxパネルで実行するため、$TMUX_PANEが設定されていれば発動する）

  $TMUX_PANEなし時の確認:
  env -u TMUX_PANE bash scripts/hooks/karo_session_start_check.sh
  echo "exit: $?"  # → exit: 0

  ## 【4】.gitignore 確認・更新

  git check-ignore -v scripts/hooks/karo_session_start_check.sh
  対象外ならば .gitignore の !scripts/hooks/ 行があることを確認。
  （既存の !scripts/hooks/ があれば追加不要）

  ## 【5】git commit & push

  difference.mdが今日(2026-04-01)であることを確認してからpush:
  grep "Generated" difference.md | head -3

  git add scripts/hooks/karo_session_start_check.sh .claude/settings.json
  git commit -m "feat: cmd_402 家老専用SessionStart hook — tmux環境誤認防止"
  git push origin original

  ## 通知・report
  bash scripts/ntfy.sh "✅ cmd_402完了: 家老専用SessionStart hook作成(tmux環境誤認防止)" "" "cmd_complete"
  bash scripts/gchat_send.sh "【cmd_402完了】家老専用SessionStart hook導入。tmux環境でagent_id=karoの場合に委譲経路と禁止事項を通知。git push済み。"

