instructions: |
  ■ リポジトリ: /home/ubuntu/pdfmerged (saneaki/pdfmerged)

  ■ 修正3: スタンプ — 横向きPDFの位置修正 (HIGH)
  【症状】横回転したPDFの右上(=実質右下)にスタンプ。縦にした時の右上が正解。
  【修正】
  - スタンプ付与のPDF操作コード（PyMuPDF/fitz使用の可能性高）を特定
  - ページのrotation属性(0/90/180/270)を取得
  - rotation値に応じてスタンプ座標を回転補正
    - rotation=0: 通常の右上
    - rotation=90: 座標変換が必要
    - rotation=180/270: 同様に変換
  - mediabox/cropboxのサイズも考慮

  ■ 修正4: スタンプ — 枝番認識修正 (HIGH)
  【症状】「甲4号証の1」「甲4号証の2」がどちらも「甲4」と認識される
  【修正】
  - ファイル名からスタンプ番号を抽出する正規表現を特定
  - 「の1」「の2」等の枝番パターンを認識するよう修正
  - 期待出力: 「甲4の1」「甲4の2」
  - テスト: 「甲4号証の1.pdf」→スタンプ「甲4の1」

  ■ 修正5: スタンプ — 取消ボタン修正 (MED)
  【症状】取消ボタンを押しても機能が感じられない
  【修正】
  - スタンプタブの取消ボタンのイベントハンドラを確認
  - 取消時の状態リセットロジック（ファイルリストクリア、プレビュー更新等）を確認
  - 正しく機能するよう修正

  ■ RACE-001注意
  他の足軽が結合/変換(428a)、連番/リネーム(428c)、墨消し/分割(428d)を同時修正中。
  スタンプタブ以外のファイルは編集しないこと。
  共通ファイル(main_window.py等)を変更する必要がある場合はreportに明記。

  ■ 報告
  - 各修正の内容
  - rotation対応のテスト結果
  - 枝番パターンのテストケース

acceptance_criteria:
