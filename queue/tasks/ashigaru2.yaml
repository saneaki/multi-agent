north_star: |
  ~/.claude/skills/python-utf8-errors-replace/SKILL.md を新設し、
  外部ツール編集ファイルの無効バイト列エラー対策を再利用可能な形で記録する。

purpose: |
  cmd_457 で発見した Python open() encoding="utf-8" errors="replace" パターンを
  SKILL.md として永続化する。

source_context: |
  出典: cmd_457
  問題: dashboard.md など外部ツールが編集するファイルを Python で open() すると
        無効バイト列(UnicodeDecodeError)が発生する。
  解決: open(path, encoding="utf-8", errors="replace") で代替文字(U+FFFD)に置換。
  横展開対象: scripts/ 配下の Python スクリプト(inbox_watcher.sh, ntfy_listener.sh,
              slim_yaml.py 等の Python 呼出箇所)

steps:
  - step: 1
    action: read_existing_skill_example
    detail: |
      既存スキルの構造を参考にする:
      cat ~/.claude/skills/shogun-docker-volume-recovery/SKILL.md | head -80
      → フロントマターとセクション構成を把握する。

  - step: 2
    action: survey_scripts
    detail: |
      shogun プロジェクトの Python スクリプトを確認:
      grep -rn "open(" /home/ubuntu/shogun/scripts/ | grep -v "errors=" | head -20
      → 横展開対象の具体例を把握する。

  - step: 3
    action: create_skill_md
    detail: |
      ~/.claude/skills/python-utf8-errors-replace/SKILL.md を新設:

      フロントマター:
        name: python-utf8-errors-replace
        description: Python open() で外部ツール編集ファイルの無効バイト列を errors="replace" で安全に読む
        tags: [python, encoding, utf-8, unicode, file-io, shogun]

      セクション構成:
        ## 問題
        - 外部ツール(Claude Code, Notion など)が編集したファイルに SJIS/Latin-1 バイトが混入
        - Python open(path) が UnicodeDecodeError で落ちる

        ## 解決パターン
        - Before/After コード例
        - errors="replace" vs errors="ignore" の違いと使い分け

        ## 横展開チェックリスト
        - 対象スクリプトの種別(dashboard 読込/YAML 処理/log 解析)
        - 検出 grep パターン: grep -rn 'open(' scripts/ | grep -v 'errors='

        ## 注意事項
        - errors="replace" は U+FFFD に置換(元データは失われないがバイト列は読めない)
        - バイナリデータ混入が疑われる場合は別途バリデーション推奨

  - step: 4
    action: write_report
    detail: |
      queue/reports/ashigaru2_report.yaml に報告書作成。

editable_files:
  - ~/.claire/skills/python-utf8-errors-replace/SKILL.md
  - queue/reports/ashigaru2_report.yaml

acceptance_criteria:
