task:
  description: |
    [action-8] 案B実装。仮説τ棄却確定 (OAuth consent 済み)。
    pdf.gs:76 の DriveApp.getFolderById を Drive Advanced Service v2 の
    Drive.Files.insert に置換し、Shared Drive 対応も含めてフォルダへの
    ファイル保存を実現する。

    【背景】
    - appsscript.json に Advanced Drive Service v2 は既に有効化済み
    - pdf.gs:49,60 で既に Drive.Files.insert/trash を使用中
    - 問題箇所: pdf.gs:76 の `DriveApp.getFolderById(folderId.trim())`

    Step 1: 対象確認
      cat /home/ubuntu/gas-mail-manager/src/pdf.gs | head -90

    Step 2: savePdfToDrive 関数を修正
      # Read /home/ubuntu/gas-mail-manager/src/pdf.gs
      # pdf.gs の savePdfToDrive 関数 (line 73-79付近) を以下に置換:
      #
      # Before:
      #   var folder = DriveApp.getFolderById(folderId.trim());
      #   var file = folder.createFile(pdfBlob.setName(fileName));
      #   return file.getUrl();
      #
      # After:
      #   var metadata = {
      #     title: fileName,
      #     parents: [{ id: folderId.trim() }]
      #   };
      #   var file = Drive.Files.insert(metadata, pdfBlob.setName(fileName),
      #                                 { supportsAllDrives: true });
      #   return 'https://drive.google.com/file/d/' + file.id + '/view';
      #
      # supportsAllDrives: true で Shared Drive (フォルダ所有者が別組織) にも対応

    Step 3: 同一ファイル内の他の DriveApp 使用箇所確認
      grep -n "DriveApp" /home/ubuntu/gas-mail-manager/src/pdf.gs
      # DriveApp.getFileById (line 56) は tempDoc 取得用 → Drive.Files.get に置換
      # Before: var pdfBlob = DriveApp.getFileById(tempDoc.id)
      # After:  var pdfMeta = Drive.Files.get(tempDoc.id);
      #         var pdfBlob = DriveApp.getFileById(tempDoc.id)  ← Blob取得はDriveApp経由でOK
      # ※ getFileById は Blob 取得用途なので置換不要

    Step 4: shogun/projects 側にも同期
      # /home/ubuntu/shogun/projects/gas-mail-manager/src/pdf.gs も同じ変更を適用

    Step 5: clasp push
      cd /home/ubuntu/gas-mail-manager && clasp push 2>&1 | tail -10

    Step 6: 動作確認 (clasp run)
      bash /home/ubuntu/shogun/scripts/gas_run.sh processAllCustomers cmd_568_b 2>&1 | tail -20
      # 93件処理 + 寺地淳子様 PDF生成成功確認

    Step 7: 報告
      bash /home/ubuntu/shogun/scripts/inbox_write.sh karo \
        "subtask_568_impl_b完了。DriveApp.getFolderById→Drive.Files.insert置換+clasp push済。clasp run結果=[成功/失敗]。ashigaru7_report.yaml参照。" \
        task_completed ashigaru7

