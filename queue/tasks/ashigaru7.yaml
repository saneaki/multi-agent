implementation_notes: |
  【Codex足軽固有の制約】
  - MCP未使用環境のため、ファイル操作は cat/grep/awk/sed等のシェルツール中心で実施
  - cat scripts/inbox_write.sh で全行確認 (175行、一括取得可能)
  - inbox_watcher.sh は1232行と長大 → grep で関連箇所 (process_unread / send_wakeup / specials parser等) を絞り込んで cat -n で行範囲指定読込推奨
  - cat > output/cmd_463_b2_codex_*.sh << 'EOF' ... EOF 形式で書き出し
  - フェーズ1 a2_codex では mermaid + .venv/python3 固定パス脆弱性指摘で品質を出した
  - フェーズ2 (実装系) では Codex の Agent 系ツールも積極活用してよい (差別化機会)

  【B2 タスク仕様 (L3: 2ファイル横断)】
  - 元ファイル(read-only):
    * scripts/inbox_write.sh (175行)
    * scripts/inbox_watcher.sh (1232行)
  - 機能要件:
    1. inbox_write.sh: 第5引数に priority (high/normal/low) を追加、デフォルト normal
       * Usage 例: bash scripts/inbox_write.sh karo "急ぎ報告" report_received gunshi high
       * YAML 出力時にメッセージに priority: <値> フィールドを追加
    2. inbox_watcher.sh: メッセージから priority を読み取り、high なら 2 回ナッジ
       * 既存メッセージ (priority フィールドなし) は normal 扱い
       * ナッジ間隔は適切なクールダウンを保つ (連続 send-keys 衝突回避)

  【実装ステップ (Codex流)】
  1. cat scripts/inbox_write.sh で全行確認
  2. grep -n "send_wakeup\|process_unread\|specials" scripts/inbox_watcher.sh で関連行特定
  3. sed -n '<start>,<end>p' scripts/inbox_watcher.sh で関連箇所のみ抽出
  4. cat > output/cmd_463_b2_codex_inbox_write.sh << 'EOF' で修正版1書き出し
  5. cat > output/cmd_463_b2_codex_inbox_watcher.sh << 'EOF' で修正版2書き出し
  6. bash -n output/cmd_463_b2_codex_*.sh で構文チェック
  7. cat > output/cmd_463_b2_codex_design.md << 'EOF' で設計書書き出し

  【出力ファイル】
  - output/cmd_463_b2_codex_inbox_write.sh (修正版1)
  - output/cmd_463_b2_codex_inbox_watcher.sh (修正版2)
  - output/cmd_463_b2_codex_design.md (設計書)

  【cmd_463 実証研究としての注意点】
  - **agent_tool_tokens 記録基準 (フェーズ1の教訓)**:
    * agent_tool_used: true/false (Codex の Agent 系ツール使用有無)
    * agent_tool_tokens: 推定値で良い
    * main_model_tokens_estimate: メインモデル(Codex 5.3)消費トークンの推定値も併記必須
    * フェーズ1 a2_codex では 52K と記録 (Agent 経由分)
      → フェーズ2 では Agent 経由 vs メイン消費を区別して記録
  - **公平性 AC (フェーズ1 a2_opus 5号の知見)**: 自分の実装の優れた点 (3項目以上) と
    懸念点 (P0/P1/P2 形式) を両論併記。片側評価を避ける。
  - **Codex への期待**: フェーズ1 では curl + 一次情報で品質を出した。フェーズ2 (実装系) では
    Codex の Agent 系ツールも積極活用してよい (差別化機会)。
    また a2_codex で .venv/python3 固定パス脆弱性を指摘した鋭さを priority 機能の
    後方互換性チェックでも発揮することを期待。
  - 想定トークン: 50K-100K
  - 想定時間: 40-90分 (1232 行の inbox_watcher.sh + シェルツール解析中心のため)

  【RACE-001 考慮】
  各モデルが独立した output/cmd_463_b2_{model}_*.{sh,md} に書き出すため競合なし。
  元ファイル (scripts/inbox_write.sh と scripts/inbox_watcher.sh) は絶対に編集しない (read-only)。

