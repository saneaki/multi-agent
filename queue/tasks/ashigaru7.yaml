      # Gemini Thinking Token Guard

      ## 問題
      Gemini 2.5 Flash / Pro は "thinking" モードで内部推論 token を消費する。
      maxOutputTokens が小さいと thinking token が予算を食い尽くし、
      実際の出力が数 token しか残らず切断される (finishReason=MAX_TOKENS)。

      ## 症状
      - finishReason: MAX_TOKENS
      - thoughtsTokenCount: 100-200 (消費済)
      - candidatesTokenCount: 5-10 (ほぼゼロ)
      - 出力: 10 字程度で切断

      ## 解決策

      ### 方法 A: maxOutputTokens を大きく設定 (推奨)
      generationConfig: {
        maxOutputTokens: 2000,  // Gemini 2.5 Flash: 2000+
        temperature: 0.3
      }
      推奨値: Gemini 2.5 Flash = 2000, Gemini 2.5 Pro = 3000

      ### 方法 B: thinkingBudget を 0 に設定 (thinking 無効化)
      generationConfig: {
        maxOutputTokens: 2000,
        thinkingConfig: {
          thinkingBudget: 0
        }
      }
      // 要約・分類タスクでは thinking 不要なため推奨

      ## Battle-tested
      | cmd | 状況 | 解決策 |
      |-----|------|--------|
      | cmd_589 | 寺地 backfill 28 件で maxOutputTokens=200 → 10 字切断 | 2000 + thinkingBudget=0 |

      ## 適用タイミング
      GAS (Apps Script) で Gemini 2.5 系 API を呼ぶ実装時に必ず確認。
      UrlFetchApp.fetch で生成 API を呼ぶ全てのスクリプトが対象。

