  【Step 2: _convert_text_to_pdf() 改行ロジック刷新】
  対象: /home/ubuntu/pdfmerged/pdf_tools/file_converter.py

  現状の問題箇所(L185-188):
  ```python
  max_chars = int((A4_WIDTH - 2 * margin) / font_size)
  ...
  max_chars = int((A4_WIDTH - 2 * margin) / 6)
  ...
  if len(line) > max_chars:
      for chunk_start in range(0, len(line), max_chars):
          chunk = line[chunk_start:chunk_start + max_chars]
  ```

  修正方針:
  - pdfmetrics.stringWidth() ベースに刷新
  - 1文字ずつ幅を加算し、available_width 超過で改行
  - タブ文字(\t)は4スペースに展開してから測定
  - max_chars 変数とハードコード除数(10, 6)は削除

  実装例:
  ```python
  from reportlab.pdfbase import pdfmetrics

  def _wrap_text(self, text, font_name, font_size, available_width):
      """pdfmetrics.stringWidth ベースのテキスト折り返し"""
      # タブ展開
      text = text.replace('\t', '    ')
      lines = []
      current_line = []
      current_width = 0.0
      for char in text:
          char_width = pdfmetrics.stringWidth(char, font_name, font_size)
          if current_width + char_width > available_width and current_line:
              lines.append(''.join(current_line))
              current_line = [char]
              current_width = char_width
          else:
              current_line.append(char)
              current_width += char_width
      if current_line:
          lines.append(''.join(current_line))
      return lines if lines else ['']
  ```

  _convert_text_to_pdf() 内でこの _wrap_text を使用するよう変更:
  - available_width = A4_WIDTH - 2 * margin
  - 各行を _wrap_text で折り返してから描画

