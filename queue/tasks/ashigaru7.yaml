task_id: subtask_473_qc_auto_check_fix
cmd_id: cmd_473
assigned_to: ashigaru7
assigned_at: "2026-04-08T15:02:00+09:00"
status: done
bloom_level: L3
report_to: gunshi
language: ja
model_note: "Opus — L012適用(Sonnet禁止)。シェルスクリプトフォールバック設計はOpus適正。"

north_star: |
  qc_auto_check.sh の PARENT_CMD 抽出を多段階フォールバック化し、
  task YAML が上書きされた状況でも軍師が自動QCを実行できるようにする。

purpose: |
  scripts/qc_auto_check.sh の SO-19 チェックで PARENT_CMD が
  task YAML 上書き時に失敗する問題を修正する。
  多段階フォールバックと明示的エラーを実装し、silent fail を禁止する。

background: |
  cmd_472 配備時に ashigaru{N}.yaml が新タスクで上書きされた結果、
  qc_auto_check.sh が参照する parent_cmd フィールドが変わり、
  軍師が5件のQCを手動検証に切り替えざるを得なくなった。

  問題箇所: scripts/qc_auto_check.sh L104-130 (SO-19チェック)
    PARENT_CMD=$(grep "parent_cmd:" "$TASK_FILE" ...)
  task YAML 上書き後は parent_cmd が元のcmd_idではなく新しいcmd_idになる。

fix_strategy: |
  多段階フォールバック(殿指示より):
    a) task YAML の parent_cmd フィールド (現行)
    b) report YAML の parent_cmd フィールド (最重要フォールバック)
    c) task ID プレフィックスから推定 (subtask_473_xxx → cmd_473)
    d) いずれにもマッチしない場合は warn で明示(silent fail禁止)

steps:
  - step: 1
    action: analyze_current_code
    detail: |
      scripts/qc_auto_check.sh を精読し、問題を特定:
      - L14: set -euo pipefail の影響範囲を確認
      - L103-131: SO-19 の PARENT_CMD 抽出ロジックを確認
      - L91-101: SO-06 の TASK_FILE 参照も確認(上書き後でも動作するか)

      現在の cmd_472 関連 task YAML を確認:
      grep "^parent_cmd:\|^cmd_id:" queue/tasks/ashigaru{4,6,7}.yaml

  - step: 2
    action: implement_fix
    detail: |
      scripts/qc_auto_check.sh を修正:

      SO-19 の PARENT_CMD 抽出を以下の多段階フォールバックに変更:

      PARENT_CMD=""
      # a) task YAML の parent_cmd (現行)
      if [ -f "$TASK_FILE" ]; then
          PARENT_CMD=$(grep "^parent_cmd:" "$TASK_FILE" 2>/dev/null | head -1 | ...)
      fi
      # b) report YAML の parent_cmd (最重要フォールバック)
      if [ -z "$PARENT_CMD" ] && [ -f "$REPORT_FILE" ]; then
          PARENT_CMD=$(grep "^parent_cmd:" "$REPORT_FILE" 2>/dev/null | head -1 | ...)
      fi
      # c) task ID プレフィックスから推定 subtask_473_xxx → cmd_473
      if [ -z "$PARENT_CMD" ]; then
          PARENT_CMD=$(echo "$TASK_ID" | grep -oP 'subtask_\K[0-9]+' | sed 's/^/cmd_/')
      fi
      # d) 推定失敗: warn で明示(silent fail禁止)
      if [ -z "$PARENT_CMD" ]; then
          add_result "SO-19" "warn" \
              "PARENT_CMD could not be determined from task/report YAML or task_id — SO-19 skipped"
      fi

      修正前後の挙動をコメントで明示すること。

  - step: 3
    action: e2e_verification
    detail: |
      修正後の動作確認:

      1. cmd_472 関連の task YAML 5件(ashigaru4/6/7 + 他)で検証:
         bash scripts/qc_auto_check.sh ashigaru4 subtask_472a5_compaction_log_analysis
         bash scripts/qc_auto_check.sh ashigaru6 subtask_472a1_codex_cli_poc
         bash scripts/qc_auto_check.sh ashigaru7 subtask_472a4_n8n_daily_guard
         → PARENT_CMD が report YAML から正しく抽出されることを確認

      2. 正常系 task YAML (上書きなし) での回帰確認:
         bash scripts/qc_auto_check.sh ashigaru1 subtask_468c3_instructions_update
         → task YAML の parent_cmd が正常に取得されることを確認

      3. bash -n で構文チェック

      注意: qc_auto_check.sh を実行すると stdout に YAML が出力される。
            set -euo pipefail なのでエラーがあればexitする。

  - step: 4
    action: write_report
    detail: |
      queue/reports/ashigaru7_report.yaml に報告書作成:
      - 修正内容(diff相当の説明)
      - E2E検証結果(5件 + 回帰確認)
      - 影響範囲

editable_files:
  - scripts/qc_auto_check.sh
  - queue/reports/ashigaru7_report.yaml

acceptance_criteria:
  - "scripts/qc_auto_check.sh の PARENT_CMD 抽出ロジックが多段階フォールバック化"
  - "PARENT_CMD 抽出失敗時は silent fail せず warn で明示"
  - "cmd_472 関連 task YAML 5件で PARENT_CMD が正しく抽出される"
  - "既存 cmd(cmd_469/470/471 等)の task YAML で回帰なし"
  - "修正前後の挙動がコメントで明示されている"
  - "queue/reports/ashigaru7_report.yaml に修正点+E2E結果+影響範囲が記録"
