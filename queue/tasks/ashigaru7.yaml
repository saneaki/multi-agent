task:
  description: |
    cmd_593: shelf-ware 即解消 + 防止体系化。
    Scope H: karo cron で --context-pct 80 固定だった問題を解消し、
    家老 pane の実 context 使用率を取得して渡す仕組みを実装する。

    north_star: "家老の実際の context 使用率に基づいた判定で、
    false positive (50% でも 80% 扱い) を排除する。"

    【問題】
    現状: crontab に `--context-pct 80` 固定
    問題: 実際の context が 50% でも 80% 扱いで /compact 推奨 → 不要な interrupt
    理想: 実 context_pct を取得して渡す

    Step 1: 現在の crontab 確認
      crontab -l | grep "safe_window\|karo_self_clear"
      # --context-pct 80 固定の行を確認

    Step 2: Claude Code の context 情報取得方法調査
      # 方法 A: role_context_notify.sh の実装を参照
      cat /home/ubuntu/shogun/scripts/role_context_notify.sh | head -80

      # 方法 B: JSONL から最新の usage stats を取得
      ls -t /home/ubuntu/.claude/projects/-home-ubuntu-shogun/*.jsonl 2>/dev/null | head -1 | \
        xargs tail -10 2>/dev/null | python3 -c "
import sys, json
for line in sys.stdin:
    try:
        d = json.loads(line)
        if 'usage' in str(d) or 'context' in str(d).lower() or 'token' in str(d).lower():
            print(json.dumps(d, ensure_ascii=False)[:300])
    except: pass
" 2>/dev/null || true

      # 方法 C: tmux statusline
      tmux display-message -p '#{status-right}' 2>/dev/null || true

    Step 3: context_pct 取得 helper script 作成
      取得可能な場合:
        Write /home/ubuntu/shogun/scripts/get_context_pct.sh
        #!/usr/bin/env bash
        # get_context_pct.sh — 家老 pane の現在の context 使用率を返す (0-100整数)
        # 取得できない場合は exit 1
        # Usage: bash scripts/get_context_pct.sh [karo|gunshi]
        (role_context_notify.sh の context 取得ロジックを参考に実装)

      取得不可能な場合:
        フォールバック設計:
        - role_context_notify.sh が記録した context_pct を /tmp/karo_context_pct.txt に保存する patch
        - safe_window_judge.sh cron が read → --context-pct に渡す
        - この設計を report に記録 (実装は role_context_notify.sh を見て判断)

    Step 4: crontab の --context-pct 修正 (取得方法確立時のみ)
      crontab -l > /tmp/cron_backup_593h.txt
      # 既存の safe_window_judge karo 行を確認
      crontab -l | grep "safe_window.*karo"
      # --context-pct 80 → 動的取得に変更

    Step 5: 動作確認
