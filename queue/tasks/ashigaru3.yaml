  description: "【背景】\nsubtask_712g で clasp push → \"Skipping push.\" → clasp status\
    \ tracked 確認 → PASS 判定したが、\n\"Skipping push.\" は SHA1 一致のため前回と差分なし = remote 反映の証拠ではない。\n\
    殿が Apps Script Editor で webapp.gs が見えないことを目視確認。clasp push 未反映確定。\n\n【手順】\n\n(1)\
    \ cd /home/ubuntu/gas-mail-manager\n\n(2) clasp push --force を実行\n    - 出力に \"\
    Pushed N files.\" の N と file 一覧を記録\n    - N >= 1 かつ src/webapp.gs が一覧に含まれること =\
    \ PASS 条件\n    - \"Skipping push.\" が出たら即 FAIL 判定\n\n(3) \"Skipping push.\" が出た場合:\n\
    \    - FAIL 判定とし、clasp の SHA1 cache clear を検討\n      (rm -rf /root/.config/clasp/creds.json\
    \ は触らず、\n       ~/.clasprc.json や clasp のローカル SHA1 cache を調査)\n    - FAIL として報告し以降の手順は実施しない\n\
    \n(4) 二次検証 (PUSH PASS 後のみ実施):\n    tmpdir=$(mktemp -d)\n    clasp pull --rootDir\
    \ \"$tmpdir\"\n    ls \"$tmpdir/src/\" もしくは \"$tmpdir/\" で webapp.gs の存在を確認\n\
    \    rm -rf \"$tmpdir\"\n\n(5) 報告 YAML に記録:\n    - pushed_files: N (数値)\n    -\
    \ pushed_file_list: [src/webapp.gs, ...]\n    - remote_verify_pull: PASS または FAIL\n\
    \    - push_output: \"Pushed N files.\" または \"Skipping push.\" の実際の出力\n\n【報告先】\n\
    karo inbox へ task_completed 送付。\n"
