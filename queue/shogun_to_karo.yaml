  command: "■ ハイブリッド陣モデル割当基準 実証研究\n\n【背景】\n現在のハイブリッド陣構成:\n- 足軽1-3号: Sonnet 4.6 + Thinking\n- 足軽4-5号: Opus 4.6 + Thinking\n- 足軽6-7号: Codex 5.3\n\
    \n各モデルの特性を実タスクで実証し、振り分け基準を策定する。\ncmd_454/460でCodex L3対応は実証済み。今回は3モデル横断の比較研究。\n\n【タスク設計（軍師主導）】\n最低6つの実タスクを設計。3カテゴリ×2件以上:\n\nカテゴリA: 調査系\n  -\
    \ A1: 既存ライブラリ調査(例: Python製○○ライブラリの代替候補3つ調査)\n  - A2: コードベース解析(例: shogunの特定モジュールの依存関係マップ作成)\n\nカテゴリB: 実装系(L2-L3レベル)\n  - B1: 単一ファイル機能追加(L2)\n\
    \  - B2: 複数ファイル横断改修(L3)\n\nカテゴリC: その他(品質系・分析系)\n  - C1: コードレビュー(既存ファイルのレビュー)\n  - C2: テスト計画策定 or バグ原因分析\n\n各タスクは:\n- 同一仕様のタスクをSonnet/Opus/Codexの3モデルに並列で振る\n\
    - RACE-001回避のため、対象ファイルや出力先は各モデルで異なるサンプル/コピーを使う\n  (例: 同じ調査をSonnetは output/A1_sonnet.md, Opusは output/A1_opus.md, Codexは output/A1_codex.md)\n\
    - 評価可能な明確なAC・期待出力を定義\n\n【実行方法】\n- 6タスク × 3モデル = 計18実行 (実態は同タスクを3並列なので6並列フェーズ×3モデル)\n- 効率化案: 6タスクを6足軽に1対1で分配し、同タスクを3モデルで実行する形ではなく、\n  同一カテゴリの異なるタスクを3モデルに分散→全タスク横断で品質傾向を観察する形でもよい\n\
    - 軍師判断で最適な実行方式を決定すること\n\n【評価軸】\n1. 品質:\n   - AC充足率\n   - コードの正確性・idiom性\n   - 出力の構造性・読みやすさ\n   - 軍師QC PASS/FAIL\n2. 速度:\n   - 開始から完了までの時間\n\
    \   - 試行回数(リトライ含む)\n3. コスト:\n   - 概算トークン使用量(reportに記載されたものから集計)\n   - 単価×トークンで概算US$計算\n4. 自律性:\n   - 追加質問の回数\n   - エラー時の自己解決能力\n5. 出力品質:\n\
    \   - ドキュメント・コメントの質\n   - 命名・構造の良し悪し\n\n【基準案の形式】\n軍師は以下のいずれか(または併用)で基準案を策定:\n- Decision Tree: タスク種別→モデル選択フロー\n- Routing Matrix: タスク種別 × モデル\
    \ の適性マトリクス(◎○△×)\n- Cost-Quality Tradeoff Chart: コスト軸×品質軸でモデルをマッピング\n\n【出力】\n1. レポートファイル:\n   - パス: output/cmd_463_hybrid_routing_baseline.md\n\
    \   - 構成: 背景/タスク設計/各モデル実行結果/評価/基準案/運用への適用方針/付録(生データ)\n   - git commit & push\n\n2. 永続ドキュメント:\n   - docs/agent-routing-baseline.md (or 適切な場所)\n\
    \   - 将来の家老が参照できる「使い分けガイド」として配置\n\n3. Google Chat送信:\n   - レポート全文をbash scripts/gchat_send.sh で送信\n   - 長文の場合は分割送信(Google Chatの上限考慮)\n\n【注意事項】\n\
    - F006準拠: 推測でなく実証データのみ使用\n- RACE-001: 同一ファイル編集の競合を絶対回避\n- Codexのcli特性: MCP未使用・git制約あり、これも評価軸に含める\n- 評価は軍師が中立的に実施。モデルへの先入観なく評価すること\n- cmd_460のL3評価結果(L3対応可)も参考にしつつ、より広範な比較を目指す\n\
    \n【参照】\n- 既存実証: cmd_454(codex足軽運用), cmd_460(L3試験)\n- Codex足軽指針: instructions/codex-ashigaru.md, AGENTS.md\n- Google Chat送信: scripts/gchat_send.sh\n"
