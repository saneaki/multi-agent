    \ Actions): build job 後に smoke job 追加\n   c. Windows PowerShell 例: `Start-Process .exe → Start-Sleep 8 → Get-Process` で生存確認\n   d. 失敗時の exit\
    \ code 非0 伝播\n4. 典型エラー:\n   - ModuleNotFoundError(import 失敗) — 起動直後に即落ち, 生存確認失敗\n   - DLL load failed(pymupdf 等) — 類似事故\n   - commit 漏れ検知の\
