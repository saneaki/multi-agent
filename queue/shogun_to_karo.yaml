  command: 'スキルファイルを作成せよ。


    ■ スキル名: shogun-n8n-gmail-trigger-cron-step-guard


    ■ 知見の概要

    n8n Gmail Triggerノードで pollInterval を custom cronExpression に設定し、

    */5（5分ごと）などのstep値を使うと、activation時に

    "polling interval too short" エラーが発生する。

    n8nのGmail Trigger内部でcron式をパースしてポーリング間隔を算出する際、

    */N のstep構文を正しく解釈できないことが原因。


    ■ 解決策

    */N (step値) を使わず、explicit minute list に変換する。

    例: */5 → 0,5,10,15,20,25,30,35,40,45,50,55


    ■ 実例（cmd_267b）

    Gmail自動化WF v5.0（WF ID: 6HfrbcXoujQSfSQC）のポーリング最適化で発見。

    平日9-19時JST（UTC 0-10時）を5分間隔にする際、

    当初 */5 0-10 * * 1-5 を使用しようとしたが上記エラーで失敗。

    0,5,10,15,20,25,30,35,40,45,50,55 0-10 * * 1-5 に変換して解決。


    ■ スキルファイル作成先

    ~/.claude/skills/shogun-n8n-gmail-trigger-cron-step-guard.md


    ■ フォーマット

    既存スキルファイル（~/.claude/skills/shogun-n8n-merge-either-or-branch.md 等）を参考に、

    frontmatter + Problem + Solution + Real Example + Detection + Prevention のセクションで構成。


    ■ 注意

    - git commit 先は ~/.claude/ リポジトリ

    '
