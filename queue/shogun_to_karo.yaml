  command: "法律文書自動分析WF（n8n WF ID: Cq0g3T60NfZGuO3t）にdocx対応を追加せよ。\n\n■ 背景\nexec 6160で「婚費答弁書.docx」がGemini APIに直接バイナリ送信され、\nMIMEタイプ非対応（application/vnd.openxmlformats-officedocument.wordprocessingml.document）で\n\
    400 Bad Requestエラーが発生した。\n\n現状: Filter PDF/Word → Download → Base64変換 → Gemini API\nPDFはBase64で送れるが、docxのMIMEタイプはGemini非対応。\n\n■ 方針: docx→テキスト抽出してGeminiに送信（案C）\n\
    \n【実装イメージ】\n```\nFilter PDF/Word\n  ├─ PDF → (既存フロー) Download → Base64 → Gemini API (inlineData)\n  └─ docx → Download → テキスト抽出(Code node)\
    \ → Gemini API (text parts)\n```\n\n具体的には:\n1. Filter PDF/Wordノードの後にIF分岐を追加（mimeType判定）\n   - PDF: 既存のBase64→Gemini APIフローへ\n   - docx: 新規テキスト抽出フローへ\n\
    2. docxテキスト抽出用Codeノードを追加\n   - python-docxやmammoth等のnpmライブラリ、またはn8nのCode nodeで\n     docxバイナリからテキストを抽出\n   - VPS上にpandocがインストール済み（cmd_273で確認済み）なので\n\
    \     execSync('pandoc --from=docx --to=plain') も選択肢\n3. 抽出テキストをGemini APIのtext partsとして送信\n   - inlineDataの代わりにtextパートで送る\n   - プロンプトは既存のものを流用\n\
    4. Gemini API以降のフロー（MD生成、Drive保存、Notion追記等）は\n   PDF/docx共通で合流させる\n\n■ 注意\n- 既存PDFフローは絶対に壊さないこと\n- Gemini APIのプロンプトはPDF/docx共通で使えるはず（法律文書分析）\n\
    - docxからのテキスト抽出で書式（見出し等）が失われるのは許容\n- テスト: 実際の.docxファイルで発火させてexec成功を確認すること\n"
