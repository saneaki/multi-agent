  command: '法律文書自動分析システム Phase 1（MVP）を構築せよ。


    ■ 概要

    Google Driveの指定フォルダにPDFファイル（訴状・準備書面・証拠等）が置かれたら、

    Gemini 2.5 FlashのマルチモーダルAPIでPDFを直接分析し、

    弁護士の立場からの要約と反論案をMDファイルとして同フォルダに保存、

    Google Chatに概要を通知するn8n WFを構築する。


    ■ WFアーキテクチャ（推定8-12ノード）

    1. Google Drive Trigger — 新規ファイル検知（フォルダID指定、ポーリング）

    2. Filter/IF — PDF判定（mimeType = application/pdf）

    3. Google Drive Download — PDFファイル取得（バイナリ）

    4. HTTP Request — Gemini 2.5 Flash API呼び出し（PDFをbase64送信）

    5. Code Node — MD整形（要約+反論案を構造化MDに変換）

    6. Google Drive Upload — MDファイルを同一フォルダにアップロード

    7. HTTP Request — Google Chat Webhook通知


    ■ Geminiプロンプト設計（重要）

    以下の構造で分析させること:

    - 書面種別の自動判定（訴状/準備書面/証拠説明書/決定書/通知書/その他）

    - 要約（300-500字）

    - 主要な主張・論点の抽出

    - 弁護士の立場からの反論案（事実関係への反論、法的主張への反論）

    - 推奨アクション（次に取るべき手続き等）

    - 関連法令・判例の示唆


    ■ MD出力フォーマット

    ファイル名: [元ファイル名]_分析.md

    内容:

    ```

    # [書面種別] 分析レポート

    **原文**: [元ファイル名]

    **分析日時**: [ISO 8601]


    ## 要約

    ...


    ## 主要な主張・論点

    1. ...

    2. ...


    ## 反論案（弁護士の立場から）

    ### 事実関係への反論

    ...

    ### 法的主張への反論

    ...

    ### 推奨アクション

    ...


    ## 関連法令・判例（参考）

    ...

    ```


    ■ Google Chat通知フォーマット

    ```

    📋 法律文書分析完了

    📄 文書: [ファイル名]

    📝 種別: [書面種別]

    📌 要約: [100字以内の要約]

    ⚖️ 主要論点: [箇条書き3点以内]

    📂 詳細: Google Driveに分析MDを保存済み

    ```


    ■ 技術パラメータ

    - Google Drive Folder ID: 1Shedqmmrt6IAg8VzZTiKex6lFCy9UG6X

    - Google Drive Credential: drive2（n8n内の既存credential名）

    - Gemini Model: gemini-2.5-flash（環境変数のGEMINI_API_KEYを使用）

    - maxOutputTokens: 8192（thinking token消費を考慮し十分に確保）

    - Google Chat Webhook: https://chat.googleapis.com/v1/spaces/AAQA_kAPRf8/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=z9377aQ6kARRhGiCwEBlEi_uvSy56xmGvAFTncFIH60

    - MD保存先: PDFと同一フォルダ（1Shedqmmrt6IAg8VzZTiKex6lFCy9UG6X）

    - errorWorkflow: v7PvNrBhRhUFQ0xN


    ■ 注意事項

    - Gemini APIへのPDF送信はbase64エンコードで行うこと（inlineData方式）

    - thinking tokenがmaxOutputTokensの予算を消費する問題に注意（shogun-gemini-thinking-token-guard参照）

    - 0件出力時のパイプラインカット防止を考慮すること

