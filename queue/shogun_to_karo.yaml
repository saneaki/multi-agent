- id: cmd_365
  timestamp: '2026-03-29T10:29:56+09:00'
  north_star: Ashigaru editing unrestricted files caused real violations (dashboard, cmd queue) and false positives (gunshi QC). A whitelist-based
    system where Karo declares allowed files per task eliminates both problems structurally.
  purpose: Replace the hardcoded forbidden-file IR-1 hook with a whitelist system where ashigaru can only edit files listed in their task YAML
    editable_files field
  acceptance_criteria:
  - Task YAML schema includes an editable_files field (list of file paths or glob patterns) that Karo sets when creating each task
  - Ashigaru are implicitly allowed to edit their own report YAML (queue/reports/ashigaru{N}_report.yaml) and their own task YAML (queue/tasks/ashigaru{N}.yaml)
    without listing them in editable_files
  - The PostToolUse IR-1 hook for Edit/Write reads the ashigaru's task YAML, extracts editable_files, and logs a violation if the target file
    is not in the whitelist (nor an implicitly allowed file)
  - The previous hardcoded forbidden-file check for ashigaru is removed from the hook
  - The gunshi→ashigaru-task-YAML false positive check is removed from the hook (gunshi is not subject to the ashigaru whitelist)
  - instructions/karo.md is updated to require editable_files in task YAML creation (Step 6 area)
  - instructions/ashigaru.md documents that only editable_files + own report/task YAML are writable
  - Existing tests are updated to reflect the new whitelist behavior
  command: "Implement editable_files whitelist system for ashigaru file access control.\n\n【Current problem】\nThe IR-1 PostToolUse hook has hardcoded\
    \ forbidden files (dashboard.md, shogun_to_karo.yaml, etc.).\nThis approach has two flaws:\n- Incomplete: files not in the list can still\
    \ be edited incorrectly\n- Over-broad: gunshi QC workflow (editing ashigaru task YAML) triggers false positives\n\n【New design】\nInvert the\
    \ model: instead of \"forbidden list\", use \"allowed list per task\".\n\n1. Task YAML editable_files field:\n   ```yaml\n   task:\n     task_id:\
    \ subtask_xxx\n     editable_files:\n       - \"scripts/log_violation.sh\"\n       - \"tests/unit/test_*.bats\"\n   ```\n   Glob patterns\
    \ supported (matched with bash pattern matching or node glob).\n\n2. Implicit allowlist (never need to be listed):\n   - queue/reports/ashigaru{N}_report.yaml\
    \ (own report, where {N} matches agent number)\n   - queue/tasks/ashigaru{N}.yaml (own task, where {N} matches agent number)\n\n3. Hook logic\
    \ (PostToolUse for Edit/Write):\n   - If agent is NOT ashigaru → skip check (karo/gunshi/shogun not restricted)\n   - Read queue/tasks/{agent_id}.yaml\n\
    \   - Extract editable_files list\n   - Check: is file_path in editable_files (with glob matching) OR is it an implicitly allowed file?\n\
    \   - If NO → log violation via log_violation.sh\n   - If editable_files field is missing from task YAML → log warning (Karo forgot to set\
    \ it) but do NOT block\n\n4. Remove from hook:\n   - Hardcoded ashigaru forbidden file checks\n   - Gunshi → ashigaru task YAML check (gunshi\
    \ is exempt from ashigaru restrictions)\n\n5. Update instructions:\n   - karo.md: Require editable_files when creating task YAML. List all\
    \ files ashigaru will need to modify.\n   - ashigaru.md: Document that you may only edit files in editable_files + own report/task YAML.\n\
    \n6. Update tests to verify whitelist behavior.\n\nParallel-safe: two ashigaru can work on this (hook changes + instruction changes) if no\
    \ RACE-001 conflict.\n"
  project: shogun
  priority: high
  status: done
