  title: 🔴緊急 Notion案件検索 body expression修正 — n8n {{ }} terminator衝突
  issued: 2026-02-19T04:00+09:00
  details: "■ 問題\ncmd_183でBug A(credential)/Bug B(Merge)は修正済み。しかしNotion案件検索ノードが\nexec 3429/3430/3431で一貫して \"invalid syntax\" エラーを返す。\n\ncurlで同じAPI呼び出しは成功する\
    \ → n8n expression評価の問題。\n\n■ 根本原因\nbody expressionに {{ }} terminator衝突バグがある:\n\n現在のbody:\n={{ JSON.stringify({\"filter\":{\"and\":[{\"property\"\
    :\"タイトル\",\"title\":{\"contains\":$json.senderLastName}},{\"property\":\"ステータス\",\"status\":{\"does_not_equal\":\"完了\"}},{\"property\":\"\
    ステータス\",\"status\":{\"does_not_equal\":\"欠損\"}}]},\"page_size\":5}) }}\n\nn8nは {{ で式開始、}} で式終了を判定する。\nしかしJavaScript内の閉じブレース }} が式終了と誤判定され、\n\
    式が途中で打ち切られて \"invalid syntax\" になる。\n\n■ 修正方法\nJSON.stringify()を使わず、JSONリテラルにexpression埋め込みに変更:\n\nbody を以下に変更:\n{\"filter\":{\"and\":[{\"\
    property\":\"タイトル\",\"title\":{\"contains\":\"{{ $json.senderLastName }}\"}},{\"property\":\"ステータス\",\"status\":{\"does_not_equal\":\"完了\"\
    }},{\"property\":\"ステータス\",\"status\":{\"does_not_equal\":\"欠損\"}}]},\"page_size\":5}\n\ncontentType を \"json\" に変更（rawではなく）。\nrawContentType\
    \ フィールドを削除。\nheaderParametersの Content-Type も削除（json modeが自動設定するため）。\n\n■ 同時修正: senderName パースバグ\nexec 3430/3431で添付ファイル確認ノードの出力を確認:\n  senderName:\
    \ \"From: Google\" ← \"From: \" プレフィックスが混入\n  senderEmail: \"From: s.en@hananoen-law.com\" ← 同上\n\n添付ファイル確認ノードのメールヘッダパース処理に \"From: \" プレフィックス除去が必要。\n\
    ※テストメールは簡易MIMEで送信したため通常メールでは発生しない可能性あり。\nexecデータで通常メール（exec 3427等）のsenderNameを確認し、\nテストメール固有の問題か通常メールでも発生するか切り分けること。\n\n■ 検証手順\n1. PUT APIでWF更新→activate\n\
    2. GETで修正箇所を確認\n3. テストメール自動送信: python3 /home/ubuntu/shogun/scripts/send_test_email.py\n   ※ このスクリプトは s.en@hananoen-law.com → s.en@grace-law.jp\
