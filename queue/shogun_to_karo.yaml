    - → senderEmail='' → 返信案パース失敗(null返却) → Notion更新・既読化が一切実行されない\n- → メールが永続的に未読残存 → 毎回の実行で重複取得（無限ループ）\n連鎖: senderEmail='' → 返信案パースnull → Gmail下書き未作成\
    \ → Notion未更新 → データ復元未実行 → 元メール既読化未実行\n\n【Bug 2（副因）】Gemini needsReply誤判断\n- メルマガ（弁護士ドットコム等）を needsReply=true と判定\n- 返信不要パスに入らず既読化もされない → Bug\
    \ 1と重なり重複処理\n\n■ 実被害（土日分）\n- 新川様「Re: LINEのやりとり」(3/28): 10回重複処理、未既読\n- 弁護士ドットコムメルマガ(3/29): 5回重複処理、未既読\n- yunokuchi0923氏 Re:(3/29): 3回重複、継続中\n\
