  command: "ntfyメッセージ受信時に将軍が処理できない問題を修正せよ。\n\n■ 根本原因（将軍が調査済み）\ninbox_watcher.sh L731-735のshogun保護ロジックが原因:\n\n```bash\nif [ \"$AGENT_ID\" = \"\
    shogun\" ] && pane_is_active && session_has_client; then\n    tmux display-message -t \"$PANE_TARGET\" -d 5000 \"inbox${unread_count}\"\n\
    \    return 0  # ← ここでreturnしてsend-keysに到達しない\nfi\n```\n\n`tmux display-message`はtmuxステータスバーに5秒間ポップアップを表示するだけで、\nClaude Codeのセッションには一切テキスト入力されない。\n\
    そのためClaudeはinboxの存在に気づかず、ntfyメッセージが永久に未処理となる。\n\n■ ログ証跡\n```\n[00:41:50] [DISPLAY] shogun pane is active + attached — showing nudge: inbox1\n\
    [00:50:14] [DISPLAY] shogun pane is active + attached — showing nudge: inbox1\n```\n2回ともdisplay-messageのみでsend-keysに到達していない。\n\n■ 修正方針: shogun\
    \ idle時はsend-keysを許可\n\nsend_wakeup()関数のL731-735を修正:\n\n変更前:\n- pane active + client attached → display-message only → return\n\n変更後:\n- pane\
    \ active + client attached + **agentがbusy** → display-message only → return（既存のbusy skip L713で処理済みなので到達しないが安全弁として残す）\n- pane active + client\
    \ attached + **agentがidle** → display-message（視覚通知）+ **send-keysでnudge配信**（Claudeが受信して処理）\n\n具体的な実装:\n```bash\nif [ \"$AGENT_ID\" = \"shogun\"\
    \ ] && pane_is_active && session_has_client; then\n    # 視覚通知は常に表示（殿への通知）\n    timeout 2 tmux display-message -t \"$PANE_TARGET\" -d 5000\
    \ \"inbox${unread_count}\" 2>/dev/null || true\n    # idle時はsend-keysも実行（Claudeが処理できるように）\n    # busy時はこのブロックに到達しない（L713で既にスキップされる）\n    #\
    \ → send-keysにfall throughさせる（returnを削除）\nfi\n```\n\nつまりL734の`return 0`を削除し、display-message後にsend-keysにfall throughさせる。\nただし、should_throttle_nudge\
    \ (L724) の前にこのifがあるため、\nthrottle checkをfall through後に再度通過するよう構成を調整すること。\n\nもしくは、もっとシンプルに:\n- L731-735のブロック全体を削除（display-messageごと）\n- 根拠:\
    \ busy時はL713で既にスキップされている。idle時はsend-keysで問題ない。\n  active+attachedの保護は不要（nudgeは短い\"inboxN\"のみで殿の入力を壊すリスクは極小）\n\n実装者判断で最適な方法を選択してよい。\n\n■ 同様の保護がある箇所（確認要）\n\
    - L852: Phase2 escalation内のshogun pane_is_active check\n- L1030: Phase3 escalation内のshogun pane_is_active check\nこれらも同様の問題がある可能性。整合性を確認し、必要なら修正。\n\
    \n■ 安全制約（変更禁止）\n- L429-434: CLI command injection禁止（/clear等をshogunに送らない）→ そのまま維持\n- L773-778: Escape escalation禁止 → そのまま維持\n\n■ テスト\n- 既存テストのshogun関連ケースを確認し、新しい動作をカバーするテスト追加\n\
    - shogun idle時にsend-keysが実行されることを検証\n\n■ 参考ファイル\n- scripts/inbox_watcher.sh: 修正対象（L731-735が核心）\n- lib/agent_status.sh: busy/idle判定\n- logs/inbox_watcher_shogun*.log:\
    \ 動作確認用ログ\n- tests/: テスト追加先\n"
