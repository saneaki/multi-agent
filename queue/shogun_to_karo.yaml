  purpose: shogun-n8n-gmail-trigger-cron-step-guard スキルファイル（SKILL.md）を作成する
  acceptance_criteria:
  - ~/.claude/skills/shogun-n8n-gmail-trigger-cron-step-guard.md が作成されている
