  purpose: "以下2点を整備する:\n1. `pyinstaller-exe-smoke-test-pattern` skill を ~/.claude/skills/ に新設し、\n   PyInstaller 製 .exe の起動確認手順をテンプレ化する\n2. pdfmerged\
    \ リポジトリの GitHub Actions workflow に smoke test step を追加し、\n   ビルド後に .exe を起動→生存確認→強制終了で起動不能を自動検知する仕組みを作る\nこれにより「コミット漏れ+smoke test なし」の事故を CI\
    \ で早期検知できる。\n"
  background: "【cmd_476 で判明した真因】\n- commit 5ad1497(v0.9.1) で `from pdf_tools.dnd_widgets import DashedDropZone`\n  が全タブに追加されたが、`pdf_tools/dnd_widgets.py`\
    \ がコミットされていなかった\n- `pdf_tools/__init__.py` も欠落 → PyInstaller がパッケージ認識不能\n- 起動直後の import で `ModuleNotFoundError` 発生\n- v0.9.1 タグ切り前に一度も起動確認していなかったためリリースまで露呈せず\n\
