  command: "法律文書自動分析WF（n8n WF ID: Cq0g3T60NfZGuO3t）の案件特定ロジックを改修せよ。\n\n■ 問題\nexec 6082で「池内久美子 vs 前村重孝」の訴訟書面を処理した際、\nGeminiが被告「前村重孝」のみをpartyNameとして抽出した。\n\
    Notion案件DBには「池内久美子」（原告）で登録されているため、\nスコア0でマッチせず低確信パスに落ちた。\n訴訟は原告・被告の双方がいるのだから、全当事者を抽出して検索すべき。\n\n■ 修正1: Geminiプロンプト変更（Code: Gemini API 案件特定ペイロード構築）\n\
    現行プロンプト:\n  {\"partyName\": \"当事者名（例: 大里太郎）\", ...}\n変更後:\n  {\"parties\": [\"原告名\", \"被告名\", ...], \"caseNumber\": \"...\", \"caseType\"\
    : \"...\", \"confidence\": \"...\"}\n- partiesは配列。原告・被告・相手方など全ての当事者名を抽出\n- 「外1名」等の不特定表現は含めない。具体的な氏名のみ\n\n■ 修正2: スコア判定コード変更（Code: スコア判定 + Notion検索クエリ）\n\
    現行: const partyName = extracted.partyName || '';\n変更後:\n  const parties = extracted.parties || [];\n  const partyName = parties[0] || '';\
    \  // 後方互換（Notion検索クエリ用）\n- parties配列全体を下流ノードに渡す\n- searchQueryは最初の当事者名で検索（Notion APIの制限上1クエリ）\n\n■ 修正3: Notionスコアリング変更（Code: Notionスコアリング）\n\
    現行: title.includes(searchParams.partyName) で70点\n変更後:\n  const parties = searchParams.parties || [searchParams.partyName];\n  // いずれかの当事者名がタイトルに含まれていればスコア70\n\
    \  const partyMatch = parties.some(p => p && title.includes(p));\n  if (partyMatch) matchScore = 70;\n- 事件番号一致（100点）は変更なし\n- 当事者名は配列のいずれかがヒットすれば70点\n\
