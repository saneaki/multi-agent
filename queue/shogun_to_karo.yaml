  title: Gmail自動化WF v5.1 バッチ処理対応（v5.0を上書きしない新WF作成）
  description: "【背景】\nv5.0 (6HfrbcXoujQSfSQC) はGmail Triggerが複数メールを同時受信した際、\n最初の1通しか処理できない構造的欠陥がある。\n\n根本原因: 3つのCode nodeが $input.first() と emailItems[0]\
    \ で\n常に最初のアイテムだけを参照している。\n\n- メールID抽出: $input.first().json + emailItems[0]\n- 会話履歴整形: emailItems[0] → return 1件\n- 人物→案件IDリスト: $input.first().json\
    \ → return 1件\n- 案件情報整形: $input.first().json → return 1件\n\n通常のポーリングでは1通ずつ拾うため表面化しないが、\ndeactivate/reactivate後やポーリング間隔中に複数通到着した場合に\n2通目以降が処理されない。exec\
    \ 7084で6通中1通しか処理されなかった。\n\n【要件】\n1. v5.0を非アクティブにせず残す（ロールバック用）\n2. 新WF「Gmail自動化ワークフロー v5.1」を新規作成\n3. 複数メール同時受信時に全通を正しく処理する\n4. 既存の判定ロジック（Gemini要約、返信必要チェック等）は変更しない\n\
    \n【修正方針: Split In Batches パターン】\n最も安全な方法は添付ファイル確認の直後にSplit In Batchesノードを追加し、\n1通ずつ処理すること。これなら既存Code nodeのロジックはそのまま使える。\n\n構造:\nGmail Trigger\
    \ → 添付ファイル確認 → **Split In Batches (batch=1)**\n  → 添付ファイル有無チェック → ...\n  → 過去メール検索 → メールID抽出 → ...\n  → Notion人物DB検索 → 人物→案件IDリスト → ...\n\
    \  → ... → Notion DB保存 → 元メール既読化 → **Loop back**\n\n注意: Split In Batchesの \"done\" 出力が全件処理後に発火する。\nループバック接続は \"loop\" 出力 → Split In Batches\
    \ input で構成する。\n\n【代替案: Code node修正】\nSplit In Batchesが複雑になる場合、各Code nodeを修正して\n$input.all() でイテレーションする方式も可。ただし以下の課題がある:\n- Merge nodeがcombineByPositionのため、両入力のアイテム数が一致する必要\n\
    - 過去メール検索→メールID抽出で1:N展開する現設計の根本変更が必要\n判断は家老に委ねる。\n\n【Phase構成】\nPhase 1: v5.0のWF JSONをエクスポートしてベースとする\nPhase 2: Split In Batches追加 + ループバック接続構成\n\
    Phase 3: テスト（手動実行で2通以上のメールを同時処理）\nPhase 4: v5.0をdeactivate → v5.1をactivate\n\n【テスト要件】\n- テストメール2通以上を送信してからWFを手動実行\n- 全通がNotionに保存されること\n-\
    \ 返信必要メールに下書きが作成されること\n- 既存の単通処理でもリグレッションがないこと\n\n【既知データ】\n- v5.0 WF ID: 6HfrbcXoujQSfSQC (34ノード, active=true)\n- n8n API KEY / Notion TOKEN:\
    \ /home/ubuntu/.n8n-mcp/n8n/.env\n- Notion メールDB: 306e8d62e4aa80f5b61bcd2a398225e7\n- 問題のCode nodes: メールID抽出, 会話履歴整形, 人物→案件IDリスト, 案件情報整形\n\
    - Gmail完了同期WF: 7vT3EcHMZpBFSx7w (連携WF、変更不要)\n- GitHub: owner=saneaki, repo=multi-agent, Issue #8(TZ)を参照\n- スキル: shogun-n8n-workflow-upgrade,\
    \ shogun-n8n-wf-versioning\n"
  project: hananoen-gmail
  priority: critical
  status: done
  github_issue: true
