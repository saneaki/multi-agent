  north_star: When /usc analyzes upstream changes, it currently has no reference for WHY fork differences exist. difference.md provides this context,
    enabling accurate conflict risk assessment and preventing accidental revert of intentional fork changes.
  purpose: Create difference.md documenting all fork-vs-upstream differences with intent, and update /usc to reference it during conflict analysis
  acceptance_criteria:
  - difference.md exists at repository root, documenting every category of fork difference from upstream
  - 'Each difference entry includes: file/directory, what changed, WHY it was changed (intent/motivation), and whether upstream changes to the
    same area should be merged or rejected'
  - Differences are categorized (e.g., infrastructure scripts, agent instructions, configuration, operational data, hooks, tests)
  - The analysis is based on actual git diff (git diff upstream/main...original --stat + per-file inspection), not guesswork
  - /usc command (at /home/ubuntu/.claude/commands/usc.md) Step 3 is updated to read difference.md before analyzing each commit, using the intent
    information to improve conflict risk judgment
  - '/usc Step 3 conflict risk assessment references difference.md categories: if upstream changes a file listed in difference.md, the entry''s
    merge guidance is consulted'
  command: 'Create difference.md and integrate with /usc.


    【Step 1: Analyze fork differences】

    Run: git diff upstream/main...original --stat

    Then for each changed file/directory, inspect the actual diff to understand WHAT and WHY.


    Group differences into categories. Expected categories (verify by actual inspection):

    a) Infrastructure scripts (scripts/*)

    b) Agent instructions (instructions/*)

    c) System configuration (CLAUDE.md, AGENTS.md, agents/default/system.md, etc.)

    d) Config & settings (config/, .claude/settings.json, .gitignore)

    e) Operational data (queue/, memory/, context/, output/)

    f) Hooks & tests (scripts/hooks/*, tests/*)

    g) Screenshots & docs (images/screenshots/*, README changes)


    Total scope: 62 files, +7463/-1739 lines.


    【Step 2: Write difference.md at repo root】

    Format per category:


    | File/Directory | Change Type | Intent | Upstream Merge Guidance |

    |---------------|-------------|--------|------------------------|


    Change Type: fork-added / fork-modified / fork-deleted

    Upstream Merge Guidance: one of:

    - "Keep fork — no upstream equivalent"

    - "Merge upstream, preserve fork sections"

    - "Accept upstream changes"

    - "Manual review required"


    Include summary section at top.


    【Step 3: Update /usc command】

    File: /home/ubuntu/.claude/commands/usc.md

    In Step 3 (conflict risk analysis), add instruction to:

    - Read difference.md before per-commit analysis

    - When a commit touches a file in difference.md, consult "Upstream Merge Guidance"

    - Include guidance in the per-commit output


    This is a research-heavy task. One ashigaru is sufficient but allow ample time for diff inspection.

    '
