  command: "2つの構造的欠陥を修正せよ。いずれもinbox_watcher.shへの拡張で実装する。\n\n■ 欠陥A: 家老の完了漏れ検知（Karo idle watchdog）\n\n【問題】\n家老がタスク実装後にidle化しても、コミット・ダッシュボード更新・将軍への報告が\n\
    未完了であることを誰も検知しない。LLMのコンテキスト喪失や手順飛ばしで\n成果物が放置される。cmd_196で実際に発生。\n\n【実装】\ninbox_watcherのメインループ内（idle検出後）にkaro専用チェックを追加:\n\n1. idle遷移検出:\n  \
    \ - agent_is_busy_check が busy→idle に遷移したことを検知（前回busy, 今回idle）\n   - 遷移直後に以下のチェックを実行\n\n2. git status チェック:\n   - `git -C \"$SCRIPT_DIR\"\
    \ status --porcelain` で未コミット変更を確認\n   - 空でなければ「報告未完了」と判定\n\n3. nudge送信:\n   - send-keysで \"uncommitted\" + Enter を送信\n   - 家老のClaude Codeがこれを受信し、未完了の報告手順を実行する\n\
    \   - 家老の指示書(karo.md)に\"uncommitted\"受信時の処理手順を追記する必要あり\n     → 別subtaskまたはこのcmd内で対応\n\n4. 頻度制限:\n   - LAST_UNCOMMITTED_NUDGE_TS で管理、120秒以内の再送を防止\n\
