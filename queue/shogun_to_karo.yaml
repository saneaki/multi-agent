    \     senderEmail = emailMatch ? emailMatch[1] : email.From;\n   }\n   ```\n4. Fix 2（必須）: `返信案パース`ノードで senderEmail空でもnull返却せず、\n   既読化パスまで到達させる設計に変更（下書き作成スキップ、Notion更新+既読化は実行）\n\
    5. WFデプロイ: PUT /api/v1/workflows/QfAYLSoYe1TcLtWC\n6. 未処理メール手動処理: 現在未読残存中のメール（yunokuchi0923, 橋口抄子）が\n   次回実行で正常処理されることを確認\n7. テスト実行で修正確認\n\
