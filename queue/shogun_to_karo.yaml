    \   - Gemini 2.5 Flashがdocxを非公式にパース可能との報告あり\n   - 公式サポートではない（400エラーを返すケースもあり）\n   - 将来的に公式対応される可能性\n6. LLM連携パターン — 抽出テキストをGemini/Claude等にtext\
