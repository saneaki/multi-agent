  command: "【フェーズ1: skill 新設】(足軽α — Opus or Sonnet+T)\n\n対象: `~/.claude/skills/pyinstaller-exe-smoke-test-pattern/SKILL.md`\n\n内容:\n1. フロントマター(name/description/trigger)\n\
