  command: "2つの構造的課題を解決せよ。\n\n■ 課題A: inbox_watcher自動再起動（auto-reload）\n\n【問題】\ninbox_watcher.shのコードを変更・コミットしても、実行中のプロセスは\n起動時の古いコードで動き続ける。cmd_196/197で発生した問題。\n\
    手動でプロセスを再起動しない限り修正が反映されない。\n\n【実装】\ninbox_watcher.shのメインループ内に自己監視ロジックを追加:\n\n1. 起動時にスクリプトのmtimeを記録:\n   ```bash\n   SCRIPT_PATH=\"${BASH_SOURCE[0]}\"\
    \n   SCRIPT_MTIME_AT_START=$(stat -c %Y \"$SCRIPT_PATH\" 2>/dev/null || stat -f %m \"$SCRIPT_PATH\" 2>/dev/null)\n   ```\n\n2. メインループの各サイクル末尾でmtimeを再チェック:\n\
    \   ```bash\n   current_mtime=$(stat -c %Y \"$SCRIPT_PATH\" 2>/dev/null || stat -f %m \"$SCRIPT_PATH\" 2>/dev/null)\n   if [ \"$current_mtime\"\
    \ != \"$SCRIPT_MTIME_AT_START\" ]; then\n       echo \"[$(date)] [AUTO-RELOAD] Script changed, restarting...\" >&2\n       exec bash \"$SCRIPT_PATH\"\
    \ \"$AGENT_ID\" \"$PANE_TARGET\" \"$CLI_TYPE\"\n   fi\n   ```\n\n3. 無限ループ防止:\n   - exec直前にLAST_RELOAD_TSを環境変数でexportし、\n     起動直後にチェック。10秒以内の再起動は1回スキップ（mtime再記録のみ）\n\
    \   - これにより「変更→exec→変更検知→exec→...」のループを防止\n\n4. macOS互換:\n   - stat -c %Y (Linux) と stat -f %m (macOS) の両方に対応\n   - 既にinbox_watcher.shで使用しているOS検出パターン（$INBOX_WATCHER_OS）を活用\n\
    \n5. 配置:\n   - メインのwhileループ末尾（check_karo_uncommittedの後）に配置\n   - testing guard内に入れないこと（テスト時はスキップ）\n\n■ 課題B: 将軍ntfy受信時の能動確認手順\n\n【問題】\n将軍は家老からの報告チェーンに依存しており、チェーンが途切れると\n\
    殿に何も伝わらない。殿がntfyで問い合わせるまで放置される。\n\n【実装】\ninstructions/shogun.mdに「Post-ntfy Processing」セクションを追加:\n\nntfyメッセージ処理後に以下の能動確認を毎回実行する:\n\n1. 未報告cmd確認:\n\
    \   - shogun_to_karo.yamlで status: done だが将軍への報告が未済のcmdを検出\n   - inbox/shogun.yamlのcmd_complete typeと照合\n\n2. 未コミット変更確認:\n   - `git status\
    \ --porcelain` で変更ファイルの有無を確認\n   - 変更があれば殿にntfyで状況報告\n\n3. ダッシュボード鮮度確認:\n   - dashboard.mdの最終更新時刻をチェック\n   - 直近のcmd完了から30分以上更新されていなければ殿に報告\n\
    \n4. 結果のntfy送信:\n   - 異常検出時: 具体的な状況をntfyで殿に報告\n   - 正常時: ntfy報告は不要（処理したntfyメッセージへの返信のみ）\n\nこの手順を「## Post-ntfy State Audit」として記載する。\n将軍のSession\
    \ Start手順やCompaction Recoveryには影響しない。\n\n■ テスト要件\n- T-AUTORELOAD-001: スクリプトmtime変更 → exec再起動\n- T-AUTORELOAD-002: mtime未変更 → 再起動なし\n- T-AUTORELOAD-003:\
    \ 10秒以内の再起動 → スキップ（ループ防止）\n\n■ 参考ファイル\n- scripts/inbox_watcher.sh: 自動再起動ロジック追加\n- instructions/shogun.md: Post-ntfy State Audit追記\n- tests/unit/test_send_wakeup.bats:\
    \ テスト追加\n"
