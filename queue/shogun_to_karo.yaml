  command: "scripts/notion_session_log.sh の日記タスク反映を大幅改善せよ。\n\n■ 修正1: 日付データの混在解消\ndashboard.mdの「本日の戦果」セクションには日付ヘッダー（例: 2/24 JST）がある。\nスクリプトのTODAY変数(JST)と一致する日付の行のみ抽出すること。\n\
    現在のパーサーは全行を取得してしまい、昨日の戦果まで含まれる。\n修正: 「本日の戦果」テーブルのヘッダーに含まれる日付を確認し、\nTODAY_DISPLAYと一致するセクションの行のみ使用する。\n\n■ 修正2: セッション概要・詳細の改善\nセッション概要(title):\
    \ 「12cmd完了(法律文書WF×4, 案件同期×3, スキル×2, システム×3)」のように\nプロジェクト別のcmd数内訳を含める。\n詳細(rich_text): 各cmdの1行要約を改行区切りで記録（現在のテーブル行そのままではなく整形）。\n\n■ 修正3: 要約プロパティ\n\
    活動ログDBに殿が「要約」(rich_text)プロパティを新設済み。\n各cmdのタイトルと結果を2-3行で要約し、このプロパティに格納すること。\n例:\n「法律文書WF: Gemini APIパースエラー修正+Upload接続修正。\n案件同期: WF統合(WF2吸収)+GitHub\
    \ Issue v2.0ラベル自動付与。\nシステム: スキル2件追記+活動ログNotion記録+upstream分析。」\n\n■ 修正4: 日記トグル形式\n現在heading_2で追記しているが、is_toggleable: trueにすること。\nトグルの子ブロックとして内容を配置する。\n\
    \n構造:\nH2 (toggle=true): Claude Code活動 \U0001F916\n  ├ paragraph: 完了: {N}cmd / ストリーク: \U0001F525{M}日目\n  ├ paragraph: \U0001F4CA 活動ログ → [リンクテキスト](活動ログページURL)\n\
    \  ├ bullet: {project}: {cmd概要}  (各cmdを1行で)\n  ├ bullet: {project}: {cmd概要}\n  └ ...\n\nNotion APIでの作成方法:\nheading_2ブロックを作成する際:\n{\n  \"type\"\
    : \"heading_2\",\n  \"heading_2\": {\n    \"rich_text\": [{\"type\":\"text\",\"text\":{\"content\":\"Claude Code活動 \U0001F916\"}}],\n    \"\
    is_toggleable\": true,\n    \"children\": [\n      // 子ブロック（paragraph, bullets等）をここに配置\n    ]\n  }\n}\n\n■ 修正5: 挿入位置\n現在は末尾にappendしているが、「音声での振り返り」H2の直後に挿入すること。\n\
    \n実装手順:\n1. 日記ページのブロック一覧を取得（既にやっている）\n2. 「音声での振り返り」を含むheading_2のblock_idを特定\n3. PATCH /v1/blocks/{page_id}/children に \"after\": \"{block_id}\"\
    \ パラメータを追加\n\n例: curl -X PATCH \".../blocks/{page_id}/children\" -d '{\"after\": \"311e8d62-...\", \"children\": [...]}'\n\n注意: \"after\"\
    パラメータはNotion API 2022-06-28から利用可能。2025-09-03でも同様。\n見つからない場合はフォールバックとして末尾追記。\n\n■ 修正6: ページリンク\n活動ログDBに作成したレコードのURLを日記トグル内に含める。\nページ作成レスポンスからURLを取得し、Notionリンク形式で挿入。\n\
