  # AC2: qc_auto_check.sh SO-23 WARN check ロジック査読
  # =========================================================
  qc_auto_check_so23_review:
    implementation_location: "scripts/qc_auto_check.sh L278-321"

    logic_decomposition:
      step1_n8n_cmd_detection:
        description: "n8n cmd 判定 (precedence order)"
        precedence:
          - "(1) task YAML の project: n8n_workflows (最も正確)"
          - "(2) shogun_to_karo.yaml の parent_cmd ブロックの project: n8n_workflows (backup)"
        verdict: "妥当 — task YAML が最も近接な source of truth、shogun_to_karo.yaml を backup に置くのは cmd decomposition 途中の ash task にも対応できる設計"

      step2_false_positive_guard:
        description: "cmd_556 (SO-23 正式化 cmd) 自体が false positive にならない discipline"
        evidence: |
          code comment L285-286:
          「注: cmd.project による判定ゆえ、command/north_star に \"n8n\" keyword が含まれるだけの
            shogun system cmd (e.g. cmd_556 SO-23 正式化) は false positive にならない。」
        awk logic L297-301:
          '^- cmd_id:' line の完全一致 + project: n8n_workflows 完全一致
          → keyword match ではなく field-based exact match
        verdict: "妥当 — 自己言及的な false positive を設計時点で予見し防御する discipline 高評価"

      step3_three_state_branching:
        description: "HAS_PENDING と resource_completion の組合せ 3 状態"
        states:
          - state: "n8n cmd + pending_resources + resource_completion あり"
            result: "pass (gunshi manual cross-check still required)"
            rationale: "auto は材料揃ってるか gate only。file_id 内容の一致は manual 領域"
          - state: "n8n cmd + pending_resources + resource_completion なし"
            result: "warn (SO-23 cross-check MUST be performed by gunshi)"
            rationale: "material 不足は軍師 escalation トリガー、FAIL にせず WARN は cmd 進行を block しない design trade-off"
          - state: "n8n cmd + pending_resources なし"
            result: "pass (SO-23 not applicable)"
            rationale: "scope 外 cmd を誤って FAIL しない配慮"
        verdict: "3 状態分岐が網羅的、rational"

      step4_warn_vs_fail_choice:
        description: "SO-23 を FAIL ではなく WARN level で auto 検査する選択"
        justification:
          - "file_id 内容の照合は auto 困難 (YAML parse + cross-file lookup)"
          - "gunshi manual cross-check が真の gate — auto は pre-gate の material 確認"
          - "FAIL にすると ash report 未完成段階で cmd 全体が進行不能になる副作用"
          - "WARN により軍師が QC 時に必ず manual cross-check を意識する structural nudging"
        concern_discussed: |
          FAIL 昇格可能性: resource_completion 欠落のまま軍師が QC 忘却する場合の fallback としては
          FAIL が強い safeguard になる。ただし現状は:
          - gunshi.md L272-278 COND-D で明示的手順化
          - SO-23 config/qc_checklist.yaml でも frequency: conditional + check_method: manual
          - test_executions/resource_completion の ashigaru.md 教育
          の多重防御があるため、WARN で十分 trade-off 妥当。
        verdict: "妥当 — WARN level 採用は auto の limitation と structural nudging の bestpractice"

    overall_logic_judgement:
      verdict: "妥当 (logic 網羅的 + false positive 防御 + trade-off rationale 明確)"
      strengths:
        - "n8n cmd detection の precedence 設計 (task YAML → shogun_to_karo.yaml backup)"
        - "cmd_556 自己 false positive 防御の design discipline (code comment 明記)"
        - "3 状態分岐が網羅的 (pass/warn/pass の semantic 各々異なる)"
        - "auto の limitation を認識した WARN level 採用"
      minor_concerns:
        - concern: "REPORT_FILE path の選択 logic 未確認 (多 ash cmd の場合どれを見るか)"
          impact: LOW
          detail: "cmd_556 は ash1/3/5 の 3 ash 報告 → qc_auto_check.sh が走る cycle で各 ash ごとに個別検査されるか、cmd 全体で集約検査されるか未確認。現在の実装は per-ash_id 検査と推定 (ashigaru_id 引数必須ゆえ)。"
          follow_up: "qc_auto_check.sh ヘッドの usage + REPORT_FILE 算出式を後続 review で確認"
        - concern: "ash report に resource_completion: が書かれていても内容 (field 完全性) は未検査"
          impact: LOW
          detail: "field-level 検査 (pending_resource_id/exec_id/all_nodes_success/output_paths/verified_at) は軍師 manual 領域。auto で grep のみなのは trade-off として妥当だが、軍師 QC 忘却時に pseudo-pass で通過するリスク。"
          follow_up: "WARN を INFO + structural field check に拡張する option は cmd_557 以降の懸案"

