libraries_surveyed:
  python:
    - PyMuPDF4LLM: "PDF→Markdown高品質。pip軽量。n8n自ホスト可"
    - pdfplumber: "PDF表抽出特化。pip軽量。n8n自ホスト可"
    - python-docx: "Docx低レベルAPI。pip軽量。Markdown変換は手動実装要"
    - markdownify: "HTML→Markdown。中間変換に活用。pip軽量"
