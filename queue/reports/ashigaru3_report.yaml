    - docling: "IBM製。高品質。重いML依存。Execute Command推奨"
    - MarkItDown: "Microsoft製。多形式対応。軽量"
  nodejs:
    - pdf-parse: "PDF→テキスト。npm軽量。Markdown変換は別途必要"
    - mammoth: "Docx→HTML高品質。npm軽量。turndownと組み合わせ推奨"
    - turndown: "HTML→Markdown。npm軽量。mammothと定番コンビ"
    - unified_remark: "Markdown処理パイプライン。後処理に強力"
    - pdf2md: "PDF→Markdown。メンテ減少傾向"
  external_tools:
    - Pandoc: "Docx→Markdown最適解。apt install一行。Execute Command"
    - Mathpix: "数式専用。有料API。HTTP Requestノードで呼び出し"
    - MinerU: "学術PDF特化。重いML依存。Execute Command"

