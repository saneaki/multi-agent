implementation_notes:
  source_consolidation: |
    cmd_468 phase1 investigation (gunshi 軍師作成・506 行) から以下を抽出:
    - 4.1 過去 7 日 46 件統計 → 日別カウント awk コマンド化
    - 4.2 時間帯分布 (11時台 6件) → hour 別カウント awk コマンド化
    - 4.4 INC-001~005 (連鎖型・1分以内3回) → 連続発生検出 awk コマンド化
    - 3.4 GAP-2 (agent_context 全空) → snapshot 突合せ手法 + git log フォールバック
    元レポートは「事象記述」中心、本スキルは「再利用可能な解析手順」中心に再構成。
  awk_pattern_design: |
    `-F'[][]'` で `[YYYY-MM-DD HH:MM:SS]` の角括弧をフィールド区切りに使い、$2 にタイムスタンプを得る
    パターンを基本形に統一。日付/時刻の split は `split(a[2],t,":")` で hour 抽出。
    連続発生検出は `count[YYYY-MM-DD HH:MM]++` の連想配列で 1 分単位の集約。
  three_layer_identification: |
    手法1 (snapshot 直接) → 手法2 (project 絞り込み) → 手法3 (git log) の段階的フォールバック設計。
    精度マトリクスを表形式で提示し、利用者が状況に応じて適切な手法を選べるようにした。
  command_verification: |
    SKILL.md 執筆中に 2 つのコマンド (日別カウント / 連続発生検出) を実際の 200 行ログで実行:
    → 日別: 12 (2026-04-03), 19 (2026-04-07) など投資レポート記載値と一致
    → 連続: `2 2026-04-07 11:29` を検出 (投資レポート記載 INC-003 と一致)
    机上の awk 構文ではなく実機動作を担保した。
  timezone_documentation: |
    compaction-log.txt はホスト時刻 (WSL2/VPS は通常 UTC)、snapshot.yaml は UTC + offset、
    shogun 規約は JST という 3 系統の混在を「注意事項」セクションで明示し、
    `date -d` 変換例を添えた。
