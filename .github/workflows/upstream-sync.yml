name: Upstream Sync (Weekly)

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync from upstream/main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: original
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/yohey-w/multi-agent-shogun.git
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Commits behind upstream/main: $BEHIND"

      - name: Notify up-to-date (skip merge)
        if: steps.check.outputs.behind == '0'
        run: |
          bash scripts/ntfy.sh "upstream/main と同期済み。追従不要。" "Upstream Sync: Up-to-date" "white_check_mark"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          SYNC_DATE=$(date -u +%Y-%m-%d)
          BEHIND=${{ steps.check.outputs.behind }}
          if git merge --no-ff upstream/main -m "chore: upstream/main weekly sync ($SYNC_DATE)"; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          else
            git diff --name-only --diff-filter=U > /tmp/conflict_files.txt
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push on success
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.result == 'success'
        run: |
          git push origin original

      - name: Notify success
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.result == 'success'
        run: |
          BEHIND=${{ steps.merge.outputs.behind }}
          bash scripts/ntfy.sh "upstream/main から ${BEHIND} コミットをマージしました。" "Upstream Sync: 成功" "tada"

      - name: Create issue on conflict
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_DATE=$(date -u +%Y-%m-%d)
          CONFLICT_FILES=$(cat /tmp/conflict_files.txt 2>/dev/null || echo "確認不可")
          gh issue create \
            --title "upstream/main sync conflict ($SYNC_DATE)" \
            --label "upstream-sync" \
            --body "## upstream/main 週次同期でコンフリクトが発生しました

**発生日時**: ${SYNC_DATE}

### 競合ファイル
\`\`\`
${CONFLICT_FILES}
\`\`\`

### 手動解決手順
1. \`git fetch upstream main\`
2. \`git merge --no-ff upstream/main\`
3. コンフリクトを手動解決
4. \`git add .\` && \`git commit\`
5. \`git push origin original\`"

      - name: Notify conflict
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.result == 'conflict'
        run: |
          bash scripts/ntfy.sh "upstream/main マージでコンフリクト発生。GitHub Issue作成済み。手動解決が必要。" "Upstream Sync: コンフリクト" "warning,rotating_light"
